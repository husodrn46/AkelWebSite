# Cloudflare Workers Static Assets config.
# Serves the pre-built static site (dist/) via a Cloudflare Worker.
# No server-side code; pure static asset hosting.
# https://developers.cloudflare.com/workers/static-assets/

name = "akelwebsite"
compatibility_date = "2025-04-20"

[assets]
directory = "./dist"
# SPA-style: unknown routes fall back to index.html so client-side
# routing keeps working for any URL not emitted as static HTML.
not_found_handling = "single-page-application"
