    : '/';
  var el = document.createElement('base');
  el.href = base;
  document.head.appendChild(el);
})();
</script>

<style>
/* ============================================================
   Akel Melamin — Foundations
   Color & Type tokens
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400;12..96,75..100,500;12..96,75..100,600;12..96,75..100,700;12..96,75..100,800&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..700,0..100,0..1;1,9..144,400..700,0..100,0..1&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* ---------- COLOR — NEUTRALS ---------- */
  /* Paper: the foundational off-white. Warm, quiet, premium.            */
  --paper:        #F7F6F3;   /* page background                            */
  --paper-soft:   #FBFAF7;   /* lifted surfaces, cards on darker ground    */
  --bone:         #EEECE6;   /* section break, muted fill                  */
  --mist:         #E4E2DB;   /* dividers, input borders                    */
  --stone:        #B8B5AC;   /* muted type, disabled                       */
  --slate:        #6E6B63;   /* secondary type                             */
  --graphite:     #1A1A18;   /* primary type, headlines — softened black   */
  --ink:          #000000;   /* pure black — display, dark band, highest   */

  /* ---------- COLOR — BRAND RED ---------- */
  /* The logo red. Loud, confident, Turkish-retail-honest.                */
  /* Used on CTAs, accents, rules, highlights. Dominant yet rationed.     */
  --red:          #CD181E;   /* primary brand red (sampled from logo)      */
  --red-dark:     #A6111A;   /* hover / pressed                             */
  --red-deep:     #7A0C13;   /* pressed / deep editorial                    */
  --red-ink:      #7A0C13;   /* type on paper (same as deep — alias)        */
  --red-soft:     rgba(205, 24, 30, 0.12);   /* focus rings, tints          */

  /* Legacy aliases — kept so existing `var(--red)` refs still work. */
  --terracotta:      var(--red);
  --terracotta-dark: var(--red-dark);
  --terracotta-ink:  var(--red-ink);
  --logo-red:        var(--red);

  /* ---------- COLOR — SEMANTIC ---------- */
  --fg:           var(--graphite);
  --fg-muted:     var(--slate);
  --fg-subtle:    var(--stone);
  --fg-display:   var(--ink);
  --fg-accent:    var(--red);

  --bg:           var(--paper);
  --bg-elevated:  var(--paper-soft);
  --bg-muted:     var(--bone);
  --bg-inverse:   var(--ink);

  --border:       var(--mist);
  --border-strong:#D4D1C8;

  --success:      #2C4A3E;
  --warning:      #B8721F;
  --danger:       var(--red);

  /* ---------- TYPE — FAMILIES ---------- */
  /* Space Grotesk: geometric grotesk, engineered feel. Full Turkish     */
  /* diacritics (ş ğ ı İ ç ö ü). Tight tracking at display sizes.        */
  --font-display: 'Bricolage Grotesque', 'Helvetica Neue', Arial, sans-serif;
  /* Fraunces: editorial serif, variable opsz — used on pull quotes,     */
  /* hero accent, and band titles to carry "crafted manufacturer" tone.   */
  --font-serif:   'Fraunces', 'Georgia', 'Times New Roman', serif;
  --font-body:    'Bricolage Grotesque', 'Helvetica Neue', Arial, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ---------- TYPE — SIZE / LEADING ---------- */
  --fs-display-xl: clamp(3.5rem, 7vw, 6.5rem);   /* hero                  */
  --fs-display:    clamp(2.5rem, 5vw, 4.5rem);   /* section headline      */
  --fs-h1:         clamp(2rem, 3.5vw, 3rem);
  --fs-h2:         clamp(1.5rem, 2.5vw, 2rem);
  --fs-h3:         1.25rem;
  --fs-lead:       1.125rem;
  --fs-body:       1rem;
  --fs-small:      0.875rem;
  --fs-caption:    0.75rem;
  --fs-micro:      0.6875rem;  /* eyebrow labels, meta                    */

  --lh-tight:   1.05;
  --lh-snug:    1.2;
  --lh-normal:  1.5;
  --lh-relaxed: 1.65;

  /* ---------- TYPE — TRACKING ---------- */
  --tr-display: -0.02em;
  --tr-tight:   -0.01em;
  --tr-normal:  0;
  --tr-wide:    0.04em;
  --tr-eyebrow: 0.14em;   /* ALL-CAPS LABELS                              */

  /* ---------- SPACING ---------- */
  /* 4px base scale                                                       */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  /* ---------- RADIUS ---------- */
  /* Restrained — industrial aesthetic. Nothing pillowy.                  */
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-pill: 999px;

  /* ---------- SHADOW ---------- */
  /* Soft, warm, never blue-black. Shadows on paper are subtle.           */
  --shadow-1: 0 1px 2px rgba(42, 42, 40, 0.04);
  --shadow-2: 0 2px 8px rgba(42, 42, 40, 0.06), 0 1px 2px rgba(42, 42, 40, 0.04);
  --shadow-3: 0 8px 24px rgba(42, 42, 40, 0.08), 0 2px 4px rgba(42, 42, 40, 0.04);
  --shadow-4: 0 16px 48px rgba(42, 42, 40, 0.10), 0 4px 8px rgba(42, 42, 40, 0.04);

  /* ---------- LAYOUT ---------- */
  --page-max:     1360px;
  --page-gutter:  clamp(20px, 4vw, 48px);

  /* ---------- MOTION ---------- */
  --ease-out:   cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-in:    cubic-bezier(0.4, 0, 0.6, 1);
  --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast:   120ms;
  --dur-med:    220ms;
  --dur-slow:   420ms;
}

/* ============================================================
   Base reset + semantic elements
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

img, svg, video { display: block; max-width: 100%; }

/* Semantic type elements (use directly, or style-match with the utility classes) */

h1, .h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-variation-settings: "wdth" 88, "opsz" 72;
  font-size: var(--fs-h1);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  color: var(--fg-display);
  margin: 0;
  text-wrap: balance;
}
.pull-serif {
  font-family: var(--font-serif);
  font-weight: 400; font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 40, "WONK" 1;
  color: var(--red);
  letter-spacing: -0.01em;
}

h2, .h2 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-h2);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  color: var(--fg-display);
  margin: 0;
  text-wrap: balance;
}

h3, .h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--fs-h3);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  color: var(--fg);
  margin: 0;
}

p, .p {
  margin: 0;
  font-size: var(--fs-body);
  line-height: var(--lh-relaxed);
  color: var(--fg);
  text-wrap: pretty;
}

.display {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-display);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-display);
  color: var(--fg-display);
  text-wrap: balance;
}

.display-xl {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: var(--fs-display-xl);
  line-height: 0.98;
  letter-spacing: -0.03em;
  color: var(--fg-display);
  text-wrap: balance;
}

.lead {
  font-size: var(--fs-lead);
  line-height: var(--lh-relaxed);
  color: var(--fg-muted);
  text-wrap: pretty;
}

.eyebrow {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--fs-micro);
  line-height: 1;
  letter-spacing: var(--tr-eyebrow);
  text-transform: uppercase;
  color: var(--fg-accent);
}

.meta {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: var(--fs-caption);
  line-height: 1.2;
  letter-spacing: var(--tr-wide);
  text-transform: uppercase;
  color: var(--fg-muted);
}

.caption {
  font-size: var(--fs-caption);
  line-height: var(--lh-normal);
  color: var(--fg-muted);
}

code, .mono {
  font-family: var(--font-mono);
  font-size: 0.9375em;
  color: var(--fg);
}

a { color: inherit; text-underline-offset: 3px; text-decoration-thickness: 1px; }

hr {
  border: 0;
  border-top: 1px solid var(--border);
  margin: var(--space-6) 0;
}

::selection { background: var(--red); color: #fff; }

/* A11y: skip-to-content link — hidden until focused */
.skip-link {
  position: fixed; top: -80px; left: 16px; z-index: 10001;
  padding: 10px 16px;
  background: var(--ink); color: var(--paper);
  text-decoration: none; border-radius: 4px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 14px;
  transition: top 200ms var(--ease-out);
}
.skip-link:focus { top: 16px; outline: 2px solid var(--red); outline-offset: 2px; }

/* Scroll-to-top FAB */
.scroll-top {
  position: fixed; right: clamp(16px, 3vw, 32px); bottom: 24px;
  width: 48px; height: 48px; padding: 0;
  background: var(--ink); color: var(--paper);
  border: 0; border-radius: 50%;
  display: grid; place-items: center;
  cursor: pointer;
  opacity: 0; pointer-events: none;
  transform: translateY(16px);
  transition: opacity 220ms, transform 220ms;
  z-index: 55;
  box-shadow: 0 8px 24px rgba(17,17,16,0.18);
}
.scroll-top.is-on { opacity: 1; pointer-events: auto; transform: translateY(0); }
.scroll-top:hover { background: var(--red); }
.scroll-top svg { width: 20px; height: 20px; stroke-width: 2; }
@media (max-width: 480px) { .scroll-top { width: 44px; height: 44px; bottom: 16px; } }

/* ============================================================
   ATMOSPHERE — grain overlay, drafting grid, custom cursor
   ============================================================ */

/* Grain overlay on the whole canvas — paper-texture feel, 0.055 opacity.
   Attached to body so it doesn't get trapped inside kit-scroll's stacking. */
body::before {
  content: "";
  position: fixed; inset: 0;
  z-index: 1; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.165  0 0 0 0 0.165  0 0 0 0 0.157  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  background-size: 240px 240px;
  opacity: 0.06;
  mix-blend-mode: multiply;
}

/* Drafting grid — shows in hero only; technical-drawing vibe */
.kit-scroll::after {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 100vh;
  z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(to right, rgba(110,107,99,0.045) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(110,107,99,0.045) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 100%);
}

/* Custom cursor — terracotta disk + crosshair on primary CTA / hero */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000;
  transform: translate(-50%, -50%);
  mix-blend-mode: multiply;
}
.cursor-dot {
  width: 6px; height: 6px; background: var(--red);
  border-radius: 50%;
  transition: width 160ms var(--ease-out), height 160ms var(--ease-out), opacity 200ms;
}
.cursor-ring {
  width: 28px; height: 28px;
  border: 1px solid var(--red);
  border-radius: 50%;
  transition: width 260ms var(--ease-out), height 260ms var(--ease-out),
              border-width 200ms var(--ease-out), opacity 200ms,
              transform 80ms linear;
}
.cursor-ring.is-on-magnet {
  width: 54px; height: 54px; border-width: 1.5px;
}
.cursor-dot.is-hidden, .cursor-ring.is-hidden { opacity: 0; }
@media (pointer: coarse), (prefers-reduced-motion: reduce) {
  .cursor-dot, .cursor-ring { display: none !important; }
}

/* Tall vertical section numbers — editorial signature on the left rail */
.section-num {
  position: absolute; left: clamp(8px, 2vw, 24px); top: 48px;
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone);
  writing-mode: vertical-rl; transform: rotate(180deg);
  transform-origin: left top;
  display: flex; align-items: center; gap: 10px;
  z-index: 2;
}
.section-num::before {
  content: ""; width: 1px; height: 56px; background: var(--border-strong);
  display: inline-block; transform-origin: center;
}
@media (max-width: 960px) { .section-num { display: none; } }

/* ============================================================
   MAXIMALIST LAYER — watermark, marquee, tilt, rings,
   letter-cascade, scroll progress, sweep-fill buttons,
   floating decorative marks
   ============================================================ */

/* Scroll progress bar (top of viewport) */
.scroll-progress {
  position: fixed; top: 0; left: 0; height: 3px;
  background: var(--red); width: 0%;
  z-index: 100; pointer-events: none;
  box-shadow: 0 0 12px rgba(205,24,30,0.4);
  transition: width 80ms linear;
}
.scroll-progress::after {
  content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
  background: linear-gradient(to right, transparent, var(--red));
}

/* Enormous faint watermark behind hero text — editorial signature */
.hero__watermark {
  position: absolute; pointer-events: none; user-select: none;
  font-family: var(--font-serif);
  font-style: italic; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  font-size: clamp(10rem, 22vw, 22rem);
  letter-spacing: -0.06em; line-height: 0.8;
  color: var(--bone); z-index: 0;
  top: 40px; right: 0;
  mix-blend-mode: multiply; opacity: 0.38;
  transform: translateZ(0);
  white-space: nowrap;
}
.hero__watermark-sub {
  position: absolute; top: 28px; left: var(--page-gutter);
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.3em; color: var(--stone);
  text-transform: uppercase; z-index: 0;
}
.hero > * { position: relative; z-index: 1; }

/* Rotating circular badge — top-right of the contained banner */
.hero__ring {
  position: absolute; width: 120px; height: 120px;
  right: calc(var(--page-gutter) + 20px); top: 20px;
  animation: ring-spin 28s linear infinite;
  z-index: 3;
  pointer-events: none;
}
.hero__ring svg { width: 100%; height: 100%; overflow: visible; }
.hero__ring text {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.22em; fill: var(--graphite);
  text-transform: uppercase;
}
.hero__ring::after {
  content: "®"; position: absolute; inset: 0; display: grid; place-items: center;
  font-family: var(--font-serif); font-weight: 400; font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 40;
  font-size: 32px; color: var(--red);
}
@keyframes ring-spin { to { transform: rotate(360deg); } }
@media (max-width: 960px) { .hero__ring { display: none; } }

/* Photo stack — multiple product photos crossfading */
.hero__photo-stack {
  position: absolute; inset: 0; overflow: hidden;
}
.hero__photo-stack img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center 55%;
  opacity: 0; transform: scale(1.04);
  transition: opacity 800ms var(--ease-out), transform 1400ms var(--ease-out);
}
.hero__photo-stack img.is-active {
  opacity: 1; transform: scale(1);
}
.hero__photo-nav {
  position: absolute; bottom: 8px; right: 8px; display: flex; gap: 0;
  z-index: 3;
}
.hero__photo-nav button {
  width: 44px; height: 44px; padding: 0;
  display: grid; place-items: center;
  background: transparent; border: 0; cursor: pointer;
}
.hero__photo-nav button::before {
  content: "";
  width: 22px; height: 4px; display: block;
  background: rgba(42,42,40,0.25);
  transition: background 200ms, width 300ms;
}
.hero__photo-nav button.is-on::before { background: var(--red); width: 36px; }

/* Infinite marquee ticker band — runs between sections */
.marquee {
  position: relative; overflow: hidden;
  background: var(--ink); color: var(--paper);
  padding: 22px 0; margin: var(--space-7) 0;
  border-top: 1px solid rgba(247,246,243,0.1);
  border-bottom: 1px solid rgba(247,246,243,0.1);
}
.marquee__track {
  display: flex; gap: 48px; white-space: nowrap;
  animation: marquee-run 42s linear infinite;
  will-change: transform;
}
.marquee--reverse .marquee__track { animation-direction: reverse; animation-duration: 56s; }
.marquee__item {
  font-family: var(--font-display); font-weight: 700;
  font-variation-settings: "wdth" 75, "opsz" 96;
  font-size: clamp(1.5rem, 3vw, 2.75rem);
  letter-spacing: -0.025em;
  display: inline-flex; align-items: center; gap: 48px;
  flex-shrink: 0;
}
.marquee__item--italic {
  font-family: var(--font-serif); font-style: italic; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 1;
  color: var(--red);
}
.marquee__bullet {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); display: inline-block; flex-shrink: 0;
}
@keyframes marquee-run {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.marquee:hover .marquee__track { animation-play-state: paused; }

/* Split-text letter cascade — wrap each letter to animate individually */
.split-text { display: inline-block; }
.split-text .letter {
  display: inline-block;
  opacity: 1; transform: translateY(14px) rotate(3deg);
  transition: opacity 600ms var(--ease-out), transform 700ms var(--ease-out);
}
.split-text.is-in .letter {
  opacity: 1; transform: translateY(0) rotate(0);
}
.split-text .letter[data-char=" "] { width: 0.28em; }
@media (prefers-reduced-motion: reduce) {
  .split-text .letter { opacity: 1 !important; transform: none !important; }
}

/* 3D tilt wrapper — used on product & category cards */
.tilt {
  transform-style: preserve-3d;
  transition: transform 200ms var(--ease-out);
  will-change: transform;
}
.tilt__inner { transform: translateZ(20px); transition: transform 300ms var(--ease-out); }
.tilt:hover .tilt__inner { transform: translateZ(30px); }

/* Button sweep fill — progress-bar-style on hover */
.btn--primary { position: relative; overflow: hidden; isolation: isolate; }
.btn--primary::before {
  content: ""; position: absolute; inset: 0; z-index: -1;
  background: var(--red-dark);
  transform: translateX(-101%);
  transition: transform 420ms var(--ease-out);
}
.btn--primary:hover::before { transform: translateX(0); }
.btn--primary { transition: color 200ms; }

/* Animated underline for link buttons */
.btn--link { position: relative; }
.btn--link::after {
  content: ""; position: absolute; left: 0; right: 100%; bottom: 2px;
  height: 1px; background: var(--red);
  transition: right 320ms var(--ease-out);
}
.btn--link:hover::after { right: 0; }

/* Floating decorative ® glyphs — editorial scatter */
.deco-reg {
  position: absolute; pointer-events: none;
  font-family: var(--font-serif); font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 40;
  font-size: 96px; color: var(--red);
  opacity: 0.08; z-index: 0;
  animation: deco-drift 9s var(--ease-inout) infinite alternate;
}
.deco-reg--1 { top: 30%; right: 2%; animation-delay: -2s; }
.deco-reg--2 { top: 72%; left: 1%; font-size: 72px; animation-delay: -5s; }
@keyframes deco-drift {
  from { transform: translateY(0) rotate(0); }
  to   { transform: translateY(-24px) rotate(-6deg); }
}

/* Diagonal arrow floating beside stats */
.deco-arrow {
  position: absolute; right: clamp(12px, 4vw, 48px); top: -42px;
  width: 80px; height: 80px; color: var(--red);
  animation: arrow-pulse 2.2s var(--ease-inout) infinite;
  pointer-events: none;
}
.deco-arrow svg { width: 100%; height: 100%; }
@keyframes arrow-pulse {
  0%, 100% { transform: translateY(0) rotate(-30deg); }
  50%      { transform: translateY(6px) rotate(-30deg); }
}

/* Category card hover — matches product diagonal lift */
.cat-card { perspective: 1000px; }
.cat-card__ph { transition: transform 380ms var(--ease-out), box-shadow 320ms var(--ease-out); }
.cat-card:hover .cat-card__ph { transform: translate(-7px, -7px) rotate(-0.35deg); }

/* Product card hover — diagonal lift toward the brand corner */
.product-card { position: relative; overflow: visible; }
.product-card__ph { transform: translateZ(0); transition: transform 380ms var(--ease-out), box-shadow 320ms var(--ease-out); }
.product-card:hover .product-card__ph { transform: translate(-7px, -7px) rotate(-0.35deg); }

/* Stats big-number — rolodex-style number flicker on count */
.stats-strip__big {
  position: relative;
}
.stats-strip__big::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -12px;
  height: 2px; background: var(--red);
  transform: scaleX(0); transform-origin: left;
  transition: transform 800ms var(--ease-out);
}
.stats-strip__item.is-counted .stats-strip__big::after {
  transform: scaleX(0.6);
}

/* Eyebrow with animated bracket marks */
.eyebrow {
  position: relative;
  padding-left: 18px;
}
.eyebrow::before {
  content: "["; position: absolute; left: 0; top: -1px;
  color: var(--red); font-weight: 700;
  animation: bracket-tick 2s var(--ease-inout) infinite;
}
@keyframes bracket-tick {
  0%, 100% { opacity: 0.4; }
  50%      { opacity: 1; }
}

/* Link hover in nav — slide-up dual layer */
.site-header__nav a {
  overflow: hidden; position: relative;
}

/* Page enter transition — quick fade + slide */
@keyframes page-in {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kit-scroll > main, .kit-scroll > section:not(.hero) {
  animation: page-in 520ms var(--ease-out) both;
}

/* Band title with gigantic italic accent */
.band__title em {
  font-family: var(--font-serif);
  font-style: italic; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 1;
  color: var(--red);
  letter-spacing: -0.02em;
}

@media (prefers-reduced-motion: reduce) {
  .hero__ring, .deco-reg, .deco-arrow, .marquee__track,
  .scroll-progress, .eyebrow::before { animation: none !important; }
}

/* ============================================================
   Akel Melamin — Marketing site UI kit
   ============================================================ */

html { scroll-behavior: smooth; }
body { overflow-x: hidden; }
.kit-scroll {
  background: var(--paper);
  position: relative;
}

/* ---------- BUTTONS ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px; border-radius: 4px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 14px; letter-spacing: 0.01em; line-height: 1;
  cursor: pointer; border: 1px solid transparent;
  transition: background var(--dur-med) var(--ease-out), color var(--dur-med) var(--ease-out), border-color var(--dur-med) var(--ease-out);
  text-decoration: none;
}
.btn svg { width: 16px; height: 16px; stroke-width: 1.75; }
.btn--sm { padding: 8px 14px; font-size: 13px; }
.btn--lg { padding: 15px 26px; font-size: 15px; }
.btn--primary { background: var(--red); color: #fff; }
.btn--primary:hover { background: var(--red-dark); }
.btn--ghost { background: transparent; color: var(--graphite); border-color: var(--border-strong); }
.btn--ghost:hover { background: var(--bone); }
.btn--link { background: transparent; color: var(--graphite); padding: 6px 0; border: 0; border-radius: 0; font-weight: 600; }
.btn--link:hover { color: var(--red); }

/* ---------- HEADER ---------- */
.site-header {
  position: sticky; top: 0; z-index: 60;
  background: rgba(247, 246, 243, 0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-med) var(--ease-out), background var(--dur-med) var(--ease-out);
}
.site-header.is-scrolled { border-bottom-color: var(--border); background: rgba(247,246,243,0.98); }
.site-header__inner {
  max-width: var(--page-max); margin: 0 auto;
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 40px;
  padding: 16px var(--page-gutter); height: 72px;
}
.site-header__brand { display: inline-flex; align-items: center; gap: 14px; height: 100%; text-decoration: none; }
.site-header__brand img { height: 40px; width: auto; }
.site-header__slogan {
  font-family: var(--font-serif); font-style: italic; font-weight: 400;
  font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 1;
  font-size: 15px; color: var(--slate);
  letter-spacing: -0.005em; padding-left: 14px;
  border-left: 1px solid var(--border);
  line-height: 1.1; max-width: 22ch;
}
@media (max-width: 1100px) { .site-header__slogan { display: none; } }
.site-header__nav { display: flex; gap: 28px; justify-content: center; }
.site-header__nav a {
  font-family: var(--font-display); font-weight: 500; font-size: 14px;
  color: var(--graphite); text-decoration: none;
  letter-spacing: 0.005em;
  padding: 4px 0; border-bottom: 1.5px solid transparent;
  transition: border-color var(--dur-fast);
}
.site-header__nav a:hover,
.site-header__nav a.is-active { border-bottom-color: var(--red); }
.site-header__actions { display: flex; align-items: center; gap: 16px; }

.lang-switch {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--slate);
}

/* Hamburger button — hidden on desktop, shown under 960px via media query */
.mobile-menu-btn {
  display: none;
  width: 44px; height: 44px; padding: 0;
  background: var(--paper-soft); border: 1px solid var(--border-strong);
  border-radius: 4px; cursor: pointer;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 4px;
  position: relative; z-index: 2;
  -webkit-tap-highlight-color: rgba(205,24,30,0.15);
  touch-action: manipulation;
}
.mobile-menu-btn:active { background: var(--bone); }
.mobile-menu-btn__bar {
  display: block; width: 18px; height: 1.5px; background: var(--graphite);
  transition: transform 220ms var(--ease-out), opacity 180ms;
  transform-origin: center;
}
.site-header.is-menu-open .mobile-menu-btn__bar:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.site-header.is-menu-open .mobile-menu-btn__bar:nth-child(2) { opacity: 0; }
.site-header.is-menu-open .mobile-menu-btn__bar:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

/* Mobile drawer */
.mobile-drawer {
  position: fixed; inset: 0; z-index: 9998;
  pointer-events: none;
  visibility: hidden;
  transition: visibility 0s linear 320ms;
}
.mobile-drawer.is-open { visibility: visible; transition-delay: 0s; }
.mobile-drawer.is-open { pointer-events: auto; }
.mobile-drawer__backdrop {
  position: absolute; inset: 0;
  background: rgba(17,17,16,0.35); opacity: 0;
  transition: opacity 260ms var(--ease-out);
  backdrop-filter: blur(4px);
}
.mobile-drawer.is-open .mobile-drawer__backdrop { opacity: 1; }
.mobile-drawer__panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(88vw, 380px);
  background: var(--paper);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 320ms var(--ease-out);
  box-shadow: var(--shadow-4);
  padding: 20px 24px 24px;
  overflow-y: auto;
}
.mobile-drawer.is-open .mobile-drawer__panel { transform: translateX(0); }
.mobile-drawer__head {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 20px; border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.mobile-drawer__close {
  width: 40px; height: 40px; padding: 0;
  background: transparent; border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--graphite);
}
.mobile-drawer__close svg { width: 18px; height: 18px; stroke-width: 1.75; }
.mobile-drawer__nav {
  display: flex; flex-direction: column; gap: 2px;
  flex: 1;
}
.mobile-drawer__nav a {
  font-family: var(--font-display); font-weight: 600;
  font-variation-settings: "wdth" 92, "opsz" 48;
  font-size: 22px; letter-spacing: -0.015em;
  color: var(--ink); text-decoration: none;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.mobile-drawer__nav a::after {
  content: "→"; color: var(--stone); font-weight: 400;
  transition: transform 200ms, color 200ms;
}
.mobile-drawer__nav a.is-active { color: var(--red); }
.mobile-drawer__nav a.is-active::after { color: var(--red); transform: translateX(4px); }
.mobile-drawer__nav a:active { background: var(--bone); }
.mobile-drawer__foot {
  display: flex; flex-direction: column; gap: 16px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.mobile-drawer__foot .btn { width: 100%; justify-content: center; }
.mobile-drawer__slogan {
  font-size: 18px; color: var(--slate); line-height: 1.3;
}
.mobile-drawer__meta {
  font-size: 10.5px; letter-spacing: 0.08em; color: var(--slate);
  line-height: 1.6;
}
.mobile-drawer__links {
  display: flex; flex-direction: column; gap: 4px;
}
.mobile-drawer__links a {
  display: inline-flex; align-items: center; gap: 10px;
  color: var(--graphite); text-decoration: none;
  font-size: 14px; font-family: var(--font-display); font-weight: 500;
  padding: 10px 0; border-bottom: 1px dashed var(--border);
}
.mobile-drawer__links a:last-child { border-bottom: 0; }
.mobile-drawer__links svg { width: 16px; height: 16px; color: var(--red); stroke-width: 1.75; }

/* Hide desktop CTA on mobile (drawer has its own) */
@media (max-width: 960px) { .site-header__cta { display: none !important; } }
.lang-switch button { background: none; border: 0; padding: 4px 2px; color: inherit; font: inherit; cursor: pointer; letter-spacing: inherit; }
.lang-switch button.is-on { color: var(--ink); font-weight: 700; }
.lang-switch__sep { color: var(--stone); }

/* ---------- SECTION ---------- */
.section {
  max-width: var(--page-max); margin: 0 auto;
  padding: var(--space-9) var(--page-gutter);
}
.section--band { padding: var(--space-9) 0; }
.section__head {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 24px; margin-bottom: var(--space-7); flex-wrap: wrap;
}
.section__title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(2rem, 4vw, 3.25rem); line-height: 1.06;
  letter-spacing: -0.025em; color: var(--ink); margin: 8px 0 0;
  max-width: 28ch;
}
/* Split-text iç span'ları balance'ı kıramadığı için başlıkta kesilmeye
   yol açıyordu. Wrapper'ın boyutunu serbest bırakıyoruz.              */
.section__title .split-text {
  display: block;
  white-space: normal;
  overflow-wrap: break-word;
}

/* ============================================================
   MOTION PRIMITIVES — reveals, stagger, magnetic
   ============================================================ */
/* Route change: fade the whole <main> in. Key={path} on main forces a
   remount so this keyframe replays every navigation. */
.page-fade {
  animation: page-fade-in 180ms var(--ease-out) both;
}
@keyframes page-fade-in {
  from { opacity: 1; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .page-fade { animation: none; }
}

/* Initial hidden state applied by JS (`.anim-init`). Kept off by default
   so the page still works with JS disabled. */
.anim-init {
  opacity: 0.55;
  transform: translateY(10px);
  transition:
    opacity 420ms var(--ease-out),
    transform 520ms var(--ease-out);
  will-change: opacity, transform;
}
.anim-init[data-anim="hero-photo"] {
  transform: translateY(14px) scale(1.025);
  transition:
    opacity 520ms var(--ease-out),
    transform 700ms var(--ease-out);
}
.anim-in {
  opacity: 1 !important;
  transform: translateY(0) scale(1) !important;
}
.anim-in[data-anim="hero-photo"] {
  transform: translateY(0) !important;
}

/* Magnetic buttons get smooth spring back */
.magnetic {
  transition:
    transform 220ms var(--ease-out),
    background var(--dur-med) var(--ease-out),
    color var(--dur-med) var(--ease-out),
    border-color var(--dur-med) var(--ease-out);
}

@media (prefers-reduced-motion: reduce) {
  .anim-init, .anim-in { transition: none !important; transform: none !important; opacity: 1 !important; }
}

/* ---------- HERO — stacked editorial: wide title, full-width banner photo ---------- */
.hero {
  max-width: 100%; margin: 0;
  padding: 0;
  position: relative; z-index: 1;
  display: flex;
  flex-direction: column;
}
.hero__text {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: var(--space-5) var(--page-gutter) var(--space-7);
  position: relative;
  text-align: left;
}
.hero__title {
  font-family: var(--font-display); font-weight: 700;
  font-variation-settings: "wdth" 82, "opsz" 96;
  font-size: clamp(3.25rem, 11vw, 10rem);
  line-height: 0.92;
  letter-spacing: -0.045em; color: var(--ink);
  margin: 0 0 28px; text-wrap: balance;
  max-width: 18ch;
  padding-bottom: 0.18em;
}
.hero__title .hero__title-line { display: inline-block; line-height: 0.95; }
.hero__title-accent {
  font-family: var(--font-serif);
  font-weight: 400; font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1;
  color: var(--red);
  letter-spacing: -0.025em;
}
.hero__body {
  font-size: 19px; line-height: 1.6; color: rgba(17,17,16,0.74);
  max-width: 52ch; margin: 0 0 28px; text-wrap: pretty;
}
.hero__cta {
  display: flex; gap: 20px; align-items: center;
  margin-bottom: 0; flex-wrap: wrap;
  position: relative; z-index: 3;
}

/* Contained banner photo — matches categories / section max-width */
.hero__visual {
  width: 100%;
  max-width: var(--page-max);
  margin: 0 auto var(--space-7);
  padding: 0 var(--page-gutter);
  aspect-ratio: auto;
  height: clamp(420px, 68vh, 780px);
  background: transparent;
  position: relative;
  display: block;
  box-shadow: none;
  border-radius: 0;
  border: 0;
}
.hero__visual::before {
  content: "";
  position: absolute;
  inset: 0 var(--page-gutter);
  border: 1px solid rgba(17,17,16,0.42);
  border-radius: 4px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.9), rgba(247,246,243,0.72)),
    var(--paper);
  box-shadow:
    inset 0 0 0 8px rgba(255,255,255,0.72),
    inset 0 0 0 9px rgba(17,17,16,0.08),
    var(--shadow-2);
  pointer-events: none;
  z-index: 0;
}
.hero__visual::after {
  content: "";
  position: absolute;
  inset: 12px calc(var(--page-gutter) + 12px);
  border: 1px solid rgba(17,17,16,0.14);
  border-radius: 2px;
  background:
    linear-gradient(var(--red), var(--red)) left top / 70px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) left top / 3px 42px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 70px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 3px 42px no-repeat,
    linear-gradient(rgba(17,17,16,0.32), rgba(17,17,16,0.32)) right top / 42px 1px no-repeat,
    linear-gradient(rgba(17,17,16,0.32), rgba(17,17,16,0.32)) right top / 1px 42px no-repeat;
  pointer-events: none;
  z-index: 4;
}
.hero__visual > * { position: relative; z-index: 1; }
.hero__photo-stack {
  position: absolute;
  inset: 12px calc(var(--page-gutter) + 12px);
  border-radius: 2px;
  box-shadow: inset 0 0 0 1px rgba(17,17,16,0.08);
}
@media (max-width: 720px) { .hero__visual { height: clamp(320px, 50vh, 520px); } }
.hero__photo {
  width: 100%; height: 100%; object-fit: cover; object-position: center 52%;
  user-select: none; -webkit-user-drag: none;
}
.hero__photo-stack img {
  object-position: center 52%;
}
.hero__visual-crop {
  position: absolute; top: 28px; left: calc(var(--page-gutter) + 28px);
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.18em; color: var(--slate);
  padding: 6px 10px; background: rgba(247,246,243,0.88);
  border-radius: 2px; backdrop-filter: blur(6px);
  z-index: 5;
}
.hero__photo-nav {
  bottom: 28px; right: calc(var(--page-gutter) + 28px);
  z-index: 5;
}

/* ORCHESTRATED HERO REVEAL — one choreographed page load
   Each element uses animation-delay to stagger (skill: "one well-
   orchestrated page load with staggered reveals beats scattered
   micro-interactions"). CSS-only, respects reduce-motion. */
@keyframes hero-rise {
  from { opacity: 1; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes hero-mask-up {
  from { opacity: 1; transform: translateY(44%); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes hero-photo-in {
  from { opacity: 1; transform: scale(1.025); filter: blur(2px); }
  to   { opacity: 1; transform: scale(1);     filter: blur(0); }
}
@keyframes hero-line-draw {
  from { transform: scaleY(0); }
  to   { transform: scaleY(1); }
}

.hero[data-anim="hero"] > .hero__text,
.hero[data-anim="hero"] > .hero__visual,
.hero[data-anim="hero"] > .section-num { opacity: 1; }

.hero[data-anim="hero"].is-ready .hero__text .eyebrow {
  animation: hero-rise 700ms var(--ease-out) 80ms both;
  opacity: 1;
}
.hero[data-anim="hero"].is-ready .hero__text { opacity: 1; }
.hero[data-anim="hero"].is-ready .hero__title {
  overflow: hidden;
}
.hero[data-anim="hero"].is-ready .hero__title .hero__title-line {
  display: inline-block;
  animation: hero-mask-up 680ms var(--ease-out) both;
}
.hero[data-anim="hero"].is-ready .hero__title .hero__title-line:nth-child(1) { animation-delay: 120ms; }
.hero[data-anim="hero"].is-ready .hero__title .hero__title-line:nth-child(2) { animation-delay: 240ms; }
.hero[data-anim="hero"].is-ready .hero__body {
  animation: hero-rise 560ms var(--ease-out) 360ms both;
}
.hero[data-anim="hero"].is-ready .hero__cta {
  animation: hero-rise 560ms var(--ease-out) 460ms both;
}
.hero[data-anim="hero"].is-ready .hero__visual {
  opacity: 1;
  animation: hero-photo-in 720ms var(--ease-out) 220ms both;
}
.hero[data-anim="hero"].is-ready .section-num {
  opacity: 1;
  animation: hero-line-draw 520ms var(--ease-out) 620ms both;
  transform-origin: top center;
}

@media (prefers-reduced-motion: reduce) {
  .hero[data-anim="hero"] > *,
  .hero[data-anim="hero"] .hero__title-line { opacity: 1 !important; animation: none !important; transform: none !important; filter: none !important; }
}

/* Safety net: if .is-ready never lands (e.g., React mount delay) we still want
   the hero visible after a second. Visibility only, not animation. */
.hero[data-anim="hero"]:not(.is-ready) > * {
  animation: hero-safety 260ms var(--ease-out) 650ms forwards;
}
@keyframes hero-safety { to { opacity: 1; } }

/* ---------- STATS STRIP (own section, under hero) ---------- */
.stats-strip {
  max-width: var(--page-max); margin: 0 auto;
  padding: 0 var(--page-gutter) var(--space-8);
}
.stats-strip__inner {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.stats-strip__item {
  padding: 32px 28px 32px 0;
  display: flex; flex-direction: column; gap: 6px;
  border-right: 1px solid var(--border);
}
.stats-strip__item:last-child { border-right: 0; }
.stats-strip__item:not(:first-child) { padding-left: 28px; }
.stats-strip__big {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(2.25rem, 3.5vw, 3rem); letter-spacing: -0.03em; color: var(--ink);
  line-height: 1; font-variant-numeric: tabular-nums;
  display: flex; align-items: baseline; gap: 2px;
}
.stats-strip__suffix { color: var(--red); }
.stats-strip__small {
  font-family: var(--font-mono); font-size: 11px; color: var(--slate);
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* ---------- CATEGORIES ---------- */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); gap: 20px 16px;
}
.cat-card {
  display: flex; flex-direction: column;
  background: none; border: 0; padding: 0; text-align: left; cursor: pointer;
  transition: transform var(--dur-med) var(--ease-out);
  color: inherit; text-decoration: none;
  position: relative; overflow: visible;
}
.cat-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0;
  width: 100%;
  aspect-ratio: var(--cat-frame-aspect, 4 / 3);
  border: 1px solid rgba(205,24,30,0.22);
  border-radius: 4px;
  background:
    linear-gradient(135deg, rgba(205,24,30,0.10), rgba(17,17,16,0.025));
  box-shadow: 0 18px 30px rgba(17,17,16,0.07);
  opacity: 0;
  pointer-events: none;
  transform: translate(3px, 3px);
  transition: opacity var(--dur-med) var(--ease-out), transform 380ms var(--ease-out);
  z-index: 0;
}
.cat-card:hover { transform: translate(-2px, -2px); }
.cat-card:hover::before {
  opacity: 1;
  transform: translate(11px, 11px);
}
.cat-card:focus-visible {
  outline: 2px solid var(--red);
  outline-offset: 6px;
}
.cat-card:hover .cat-card__ph {
  border-color: rgba(17,17,16,0.36);
  box-shadow:
    inset 0 0 0 8px rgba(255,255,255,0.74),
    var(--shadow-3);
}
.cat-card__ph {
  aspect-ratio: var(--cat-frame-aspect, 4 / 3); background: #fff;
  border: 1px solid rgba(17,17,16,0.2);
  border-radius: 4px; overflow: hidden;
  display: grid; place-items: center;
  box-shadow:
    inset 0 0 0 8px rgba(255,255,255,0.7),
    var(--shadow-1);
  transition: transform 380ms var(--ease-out), box-shadow var(--dur-med) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
  position: relative; z-index: 1;
}
.cat-card__ph::before,
.cat-card__ph::after {
  content: "";
  position: absolute;
  pointer-events: none;
  z-index: 3;
}
.cat-card__ph::before {
  inset: 9px;
  background:
    linear-gradient(var(--ink), var(--ink)) left top / 40px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) left top / 1px 40px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 40px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 1px 40px no-repeat;
  opacity: 0.64;
}
.cat-card__ph::after {
  inset: 12px;
  background:
    linear-gradient(var(--red), var(--red)) left top / 28px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) left top / 3px 28px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 28px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 3px 28px no-repeat;
}
.cat-card__foot {
  padding: 14px 2px 0; display: flex; justify-content: space-between; align-items: baseline;
  position: relative; z-index: 1;
}
.cat-card__label {
  font-family: var(--font-display); font-weight: 700; font-size: 18px;
  letter-spacing: -0.012em; color: var(--ink);
}
.cat-card__count {
  font-family: var(--font-mono); font-size: 11px; color: var(--slate);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.cat-shape { width: 60%; aspect-ratio: 1; border-radius: 50%; background: var(--paper-soft); border: 1px solid var(--border); }
.cat-shape--trays { border-radius: 8px; width: 72%; aspect-ratio: 3/2; }
.cat-shape--plates { width: 68%; }
.cat-shape--bowls { width: 52%; }
.cat-shape--serve { width: 44%; border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%; }
.cat-shape--kids { background: var(--red); }
.cat-shape--deco { background: var(--graphite); }
.cat-card:nth-child(7) .cat-shape { background: var(--red); }

.cat-card__photo {
  width: 100%; height: 100%; object-fit: cover;
  position: relative; z-index: 2;
  transition: transform var(--dur-slow) var(--ease-out);
}
.cat-card:hover .cat-card__photo { transform: scale(1.03); }

/* ---------- EDITORIAL SPREAD ---------- */
.editorial {
  position: relative; width: 100%;
  max-width: 1120px; margin: var(--space-7) auto 0;
  padding: 0 var(--page-gutter);
}
.editorial__photo {
  width: 100%; height: clamp(320px, 42vw, 520px);
  object-fit: cover; object-position: center 48%;
  border-radius: 4px; display: block;
  box-shadow: var(--shadow-2);
  animation: editorial-kenburns 22s ease-in-out infinite alternate;
  will-change: transform;
}
@keyframes editorial-kenburns {
  0%   { transform: scale(1.02) translate3d(0, 0, 0); }
  100% { transform: scale(1.09) translate3d(-1.2%, -0.8%, 0); }
}
@media (prefers-reduced-motion: reduce) {
  .editorial__photo { animation: none; transform: none; }
}
.editorial__caption {
  position: absolute; left: calc(var(--page-gutter) + 36px);
  bottom: 36px; max-width: 460px;
  padding: 24px 28px;
  background: rgba(17,17,16,0.72);
  backdrop-filter: blur(8px);
  border-radius: 4px;
  color: var(--paper);
}
.eyebrow--light { color: rgba(247,246,243,0.72); }
.editorial__title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(1.5rem, 2.4vw, 2.2rem);
  letter-spacing: -0.02em; line-height: 1.08;
  margin: 10px 0 10px; color: var(--paper);
}

  font-size: 14.5px; line-height: 1.55;
  color: rgba(247,246,243,0.86);

}
@media (max-width: 720px) {
  .editorial__photo { height: 360px; object-position: center 52%; }
  .editorial__caption { left: calc(var(--page-gutter) + 16px); right: calc(var(--page-gutter) + 16px); bottom: 16px; padding: 18px 20px; max-width: none; }
  .editorial__body { font-size: 13.5px; }
}

/* ---------- REFERENCES ---------- */
.references-preview {
  max-width: var(--page-max);
  margin: var(--space-8) auto 0;
  padding: 0 var(--page-gutter);
}
.references-preview__panel {
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.25fr);
  gap: 48px;
  align-items: center;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--border);
  padding: 36px 0;
}
.references-preview__title,
.references-page__title {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.026em;
  line-height: 1.05;
  color: var(--ink);
  text-wrap: balance;
}
.references-preview__title {
  font-size: clamp(1.75rem, 3vw, 2.6rem);
  margin: 10px 0 14px;
}
.references-preview__body {
  color: rgba(17,17,16,0.68);
  font-size: 16px;
  line-height: 1.6;
  margin: 0 0 20px;
  max-width: 52ch;
}
.reference-logo-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.reference-logo {
  position: relative;
  min-height: 118px;
  padding: 24px 22px;
  display: grid;
  place-items: center;
  overflow: hidden;
  border: 1px solid var(--border);
  background: rgba(251,250,247,0.82);
  color: var(--graphite);
}
.reference-logo::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
}
.reference-logo::after {
  content: "";
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(17,17,16,0.08);
  pointer-events: none;
}
.reference-logo img {
  max-width: 92%;
  max-height: 76px;
  object-fit: contain;
  filter: grayscale(1);
}
.reference-logo--compact img {
  max-height: 86px;
}
.reference-logo-grid .reference-logo:last-child:nth-child(3n + 1),
.references-page__grid .reference-logo:last-child:nth-child(3n + 1) {
  grid-column: span 3;
}
.reference-logo-grid .reference-logo:last-child:nth-child(3n + 1) img,
.references-page__grid .reference-logo:last-child:nth-child(3n + 1) img {
  max-width: min(420px, 82%);
}
.reference-logo--dark {
  background: #151514;
  border-color: rgba(17,17,16,0.28);
}
.reference-logo--dark::after {
  border-color: rgba(247,246,243,0.16);
}
.reference-logo--dark img {
  filter: none;
}
.reference-logo__slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
}
.reference-logo__mark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.reference-logo__label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--slate);
}
.references-page__title {
  font-size: clamp(2.4rem, 6vw, 5.2rem);
  margin: 14px 0 18px;
  max-width: 11ch;
}
.references-page__lead {
  max-width: 68ch;
}
.references-page__grid {
  margin-top: var(--space-6);
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  max-width: 980px;
}
.references-page__note {
  margin-top: var(--space-5);
  padding-top: 24px;
  border-top: 1px solid var(--border);
  color: var(--slate);
  max-width: 72ch;
}

/* ---------- BANDS ---------- */
.band {
  background: var(--ink); color: var(--paper);
  padding: var(--space-8) var(--page-gutter);
  display: grid; grid-template-columns: 1.1fr 1fr; gap: 64px; align-items: center;
  max-width: 1680px; margin: 0 auto;
}
.band__title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.025em;
  line-height: 1.03; color: var(--paper); margin: 10px 0 20px;
  text-wrap: balance;
}
.band__body { font-size: 17px; line-height: 1.55; color: rgba(247,246,243,0.72); max-width: 50ch; margin: 0 0 28px; }
.band .btn--ghost { color: var(--paper); border-color: rgba(247,246,243,0.3); }
.band .btn--ghost:hover { background: rgba(247,246,243,0.08); }
.band .eyebrow { color: var(--red); }
.band__facts {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: rgba(247,246,243,0.12);
  border: 1px solid rgba(247,246,243,0.12);
}
.fact {
  background: var(--ink); padding: 24px 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.fact__k { font-family: var(--font-mono); font-size: 10.5px; color: rgba(247,246,243,0.6); letter-spacing: 0.08em; text-transform: uppercase; }
.fact__v { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--paper); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }

.catalog-band {
  position: relative;
  background: var(--bone); border: 1px solid var(--border);
  border-radius: 4px; padding: 48px;
  display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: center;
  overflow: hidden;
}
.catalog-band__title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.75rem, 3vw, 2.5rem); letter-spacing: -0.025em; color: var(--ink); line-height: 1.05; margin: 10px 0 14px; position: relative; z-index: 1; }
.catalog-band__body { color: var(--slate); max-width: 46ch; margin: 0; font-size: 16px; line-height: 1.55; position: relative; z-index: 1; }
.catalog-band__right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; position: relative; z-index: 1; }
.catalog-band__note { color: var(--slate); }
.catalog-band__ring {
  position: absolute; width: 140px; height: 140px;
  left: 40%; top: -30px;
  animation: ring-spin 36s linear infinite;
  z-index: 0;
  opacity: 0.55;
  pointer-events: none;
}
.catalog-band__ring svg { width: 100%; height: 100%; overflow: visible; }
.catalog-band__ring text {
  font-family: var(--font-mono); font-size: 8.5px;
  letter-spacing: 0.22em; fill: var(--graphite);
  text-transform: uppercase;
}
@media (max-width: 720px) { .catalog-band__ring { display: none; } }

/* ---------- PRODUCT GRID ---------- */
/* Shared form primitives — used by products toolbar search/sort */
.field { display: flex; flex-direction: column; gap: 6px; }
.field__lbl { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--graphite); }
.input, .select, textarea.input {
  font-family: var(--font-body); font-size: 15px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--paper-soft);
  color: var(--graphite);
  outline: none;
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);

.input:focus, .select:focus, textarea.input:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 2px rgba(205,24,30,0.18);
}
.select {
  appearance: none;
  background-image:
    linear-gradient(45deg, transparent 50%, var(--slate) 50%),

  padding-right: 36px;
  cursor: pointer;
}

.products-toolbar {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) 220px auto;
  gap: 14px 18px;
  align-items: end;
  margin-bottom: 24px;
}
.products-toolbar__field { display: flex; flex-direction: column; gap: 8px; }
.products-toolbar__meta {
  display: flex; justify-content: flex-end; align-items: center;

}
.products-toolbar__meta .meta { color: var(--graphite); }
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--space-6); }
.chip {

  padding: 8px 16px; border-radius: 999px; min-height: 44px;
  font-family: var(--font-display); font-weight: 600; font-size: 13px;

.chip.is-on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px 24px; }
.product-grid__more { display: flex; justify-content: center; margin-top: 40px; }
.product-care {

.product-care__title {

.product-care__body {

}
.product-care__grid {

.product-care__block {

.product-card {

  background:
    linear-gradient(135deg, rgba(205,24,30,0.10), rgba(17,17,16,0.025));
  box-shadow: 0 18px 30px rgba(17,17,16,0.07);
  opacity: 0;
  pointer-events: none;
  transform: translate(3px, 3px);
  transition: opacity var(--dur-med) var(--ease-out), transform 380ms var(--ease-out);
  z-index: 0;
}
.product-card:hover { transform: translate(-2px, -2px); }
.product-card:hover::before {
  opacity: 1;
  transform: translate(11px, 11px);
}
.product-card:focus-visible {
  outline: 2px solid var(--red);

}
.product-card:hover .product-card__ph {
  box-shadow:
    inset 0 0 0 8px rgba(255,255,255,0.76),
    var(--shadow-3);
  border-color: rgba(17,17,16,0.42);
}
.product-card__ph {
  aspect-ratio: 4/3;
  background: #fff;
  border: 1px solid rgba(17,17,16,0.22);
  border-radius: 4px; display: grid; place-items: center;
  box-shadow:
    inset 0 0 0 8px rgba(255,255,255,0.72),
    var(--shadow-1);
  transition: transform 380ms var(--ease-out), box-shadow var(--dur-med), border-color var(--dur-fast);
  position: relative; overflow: hidden; z-index: 1;
}
.product-card__ph::before,
.product-card__ph::after {
  content: "";
  position: absolute;
  pointer-events: none;
  z-index: 3;
}
.product-card__ph::before {
  inset: 9px;
  background:
    linear-gradient(var(--ink), var(--ink)) left top / 48px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) left top / 1px 48px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 48px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 1px 48px no-repeat;
  opacity: 0.72;
}
.product-card__ph::after {
  inset: 12px;
  background:
    linear-gradient(var(--red), var(--red)) left top / 34px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) left top / 3px 34px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 34px 3px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 3px 34px no-repeat;
}
.product-card__body { position: relative; z-index: 1; padding: 14px 4px 0; display: flex; flex-direction: column; gap: 6px; }
.product-card__meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.product-card__eyebrow { font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.14em; color: var(--red); }
.product-card__name {
  font-family: var(--font-display); font-weight: 700; font-size: 16px;
  letter-spacing: -0.01em; color: var(--ink); line-height: 1.25;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card__spec {
  font-family: var(--font-mono); font-size: 11px;
  color: rgba(17,17,16,0.56);
  font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  margin-top: 2px;
}

.product-card__photo {
  width: 84%; height: 84%; object-fit: contain;
  padding: 0;
  transform: none;
  transition: transform var(--dur-slow) var(--ease-out);
  position: relative; z-index: 2;
}
.product-card:hover .product-card__photo { transform: scale(1.025); }

/* Photo-missing placeholder — SKU label on tinted ph bg. Visible by default;
   hidden once onLoad tags the container with .is-photo-loaded. */
.product-card__placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center; gap: 6px;
  grid-auto-rows: min-content;
  align-content: center;
  padding: 16px; text-align: center;
  color: var(--slate);
  z-index: 1;
}
.product-card__ph.is-photo-loaded .product-card__placeholder { display: none; }
.product-card__placeholder-sku {
  font-family: var(--font-mono); font-size: 13px;
  letter-spacing: 0.06em; color: var(--graphite);
  font-variant-numeric: tabular-nums;
}
.product-card__placeholder-note {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--slate); opacity: 0.72;
}

.product-card__variants { display: inline-flex; gap: 6px; }
.variant-dot {
  width: 14px; height: 14px; border-radius: 50%; padding: 0;
  border: 1.5px solid var(--border-strong); background: #fff;
  cursor: pointer; transition: border-color var(--dur-fast), transform var(--dur-fast);
}
.variant-dot--black { background: #000000; border-color: #000000; }
.variant-dot--white { background: #F7F6F3; }
.variant-dot--custom { background: var(--red); border-color: var(--red); }

/* Product badge (etiket) */
.product-card__badge {
  position: absolute; top: 12px; left: 12px;
  font-family: var(--font-display); font-weight: 600;
  font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; background: var(--ink); color: var(--paper);
  border-radius: 2px;
  z-index: 4;
}
/* SKU chip on the card photo — catalog-style, top-right. Paper bg with a
   hint of blur so it stays legible on both light plates and photographic
   tabletops. */
.product-card__code {
  position: absolute; top: 12px; right: 12px;
  font-family: var(--font-mono); font-size: 10.5px;
  padding: 4px 9px; background: rgba(247,246,243,0.92);
  color: var(--graphite); border-radius: 2px;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  backdrop-filter: blur(4px);
  z-index: 4;
}
.variant-dot:hover { transform: scale(1.15); }
.variant-dot.is-on { outline: 1.5px solid var(--ink); outline-offset: 2px; }

.plate {
  width: 58%; aspect-ratio: 1; border-radius: 50%;
  background: var(--paper-soft); border: 1px solid var(--border);
  box-shadow: inset 0 0 0 10px rgba(0,0,0,0.02);
}
.plate--xl { width: 74%; }
.plate--trays { border-radius: 6px; width: 70%; aspect-ratio: 3/2; }
.plate--dinner { background: var(--paper-soft); }
.plate--bowls  { width: 46%; box-shadow: inset 0 -12px 20px -8px rgba(0,0,0,0.1); }
.plate--plates { width: 62%; }
.plate--kids   { background: var(--red); border-color: var(--red-dark); }

/* ---------- PRODUCT DETAIL ---------- */
.pd { display: grid; grid-template-columns: 1.3fr 1fr; gap: 64px; margin-top: 24px; }
.pd__hero {
  aspect-ratio: var(--pd-frame-aspect, 1 / 1); min-height: 520px;
  background: #fff;
  border: 1px solid rgba(17,17,16,0.22);
  border-radius: 4px; display: grid; place-items: center;
  box-shadow:
    inset 0 0 0 10px rgba(255,255,255,0.72),
    var(--shadow-1);
  position: relative; overflow: hidden;
}
.pd__hero::before,
.pd__hero::after {
  content: "";
  position: absolute;
  pointer-events: none;
}
.pd__hero::before {
  inset: 12px;
  background:
    linear-gradient(var(--ink), var(--ink)) left top / 64px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) left top / 1px 64px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 64px 1px no-repeat,
    linear-gradient(var(--ink), var(--ink)) right bottom / 1px 64px no-repeat;
  opacity: 0.72;
  z-index: 3;
}
.pd__hero::after {
  inset: 16px;
  background:
    linear-gradient(var(--red), var(--red)) left top / 46px 4px no-repeat,
    linear-gradient(var(--red), var(--red)) left top / 4px 46px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 46px 4px no-repeat,
    linear-gradient(var(--red), var(--red)) right bottom / 4px 46px no-repeat;
  z-index: 4;
}
.pd__caption { position: absolute; bottom: 16px; left: 20px; color: var(--slate); z-index: 4; }
.pd__photo { position: relative; z-index: 2; }
.pd__placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center; gap: 10px;
  grid-auto-rows: min-content; align-content: center;
  padding: 24px; text-align: center; z-index: 2;
}
.pd__placeholder-sku {
  font-family: var(--font-mono); font-size: 22px;
  letter-spacing: 0.06em; color: var(--graphite);
  font-variant-numeric: tabular-nums;
}
.pd__placeholder-note {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--slate); opacity: 0.72;
}
.pd__hero.is-photo-loaded .pd__placeholder { display: none; }
.pd__thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
.pd__thumb {
  aspect-ratio: 1; background: var(--bone); border-radius: 2px;
  border: 1px solid var(--border); cursor: pointer;
}
.pd__thumb--0 { background: var(--paper-soft); }
.pd__thumb--1 { background: var(--graphite); }
.pd__thumb--2 { background: var(--red); }
.pd__thumb--3 { background: var(--bone); }
.pd__thumb--photo { overflow: hidden; padding: 0; background: var(--paper); display: grid; place-items: center; }
.pd__thumb--photo img { width: 100%; height: 100%; object-fit: cover; }
.pd__thumb--photo.is-on { outline: 2px solid var(--ink); outline-offset: 2px; border-color: var(--ink); }
.pd__photo {
  width: 100%; height: 100%; object-fit: contain;
  padding: 6%;
  transition: opacity 240ms var(--ease-out);
}
.pd__hero--imaj,
.pd__hero--plain {
  min-height: 0;
}
.pd__photo--imaj {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 0;
}
.pd__nav {
  position: absolute; bottom: 16px; right: 16px;
  display: flex; gap: 6px; z-index: 4;
}
.pd__nav button {
  width: 22px; height: 4px; padding: 0;
  background: rgba(42,42,40,0.28);
  border: 0; cursor: pointer;
  transition: background 200ms, width 300ms;
}
.pd__nav button.is-on { background: var(--red); width: 36px; }
.pd__thumbs--gallery { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); max-width: 220px; }
.pd__summary {
  display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px; margin-top: 12px;
  background: var(--border); border: 1px solid var(--border);
}
.pd__summary-item {
  padding: 16px 14px;
  background: rgba(247,246,243,0.94);
  display: flex; flex-direction: column; gap: 8px;
}
.pd__summary-item .meta { color: var(--stone); }
.pd__summary-item strong {
  font-family: var(--font-display); font-weight: 700;
  font-size: 15px; line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.012em;
}
.swatch--btn { padding: 0; cursor: pointer; }
.swatch--btn.is-on { outline: 1.5px solid var(--ink); outline-offset: 3px; }
.pd__title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.75rem, 3vw, 2.5rem); letter-spacing: -0.025em; color: var(--ink); line-height: 1.05; margin: 10px 0 14px; text-wrap: balance; }
.pd__spec { color: rgba(17,17,16,0.68); margin: 0 0 24px; font-size: 16px; line-height: 1.65; }
.pd__info { align-self: start; position: sticky; top: 104px; }
.pd__cta-card {
  padding: 22px;
  margin-bottom: 24px;
  border: 1px solid rgba(17,17,16,0.1);
  background: linear-gradient(180deg, rgba(247,246,243,0.98) 0%, rgba(242,239,233,0.98) 100%);
  box-shadow: var(--shadow-2);
  border-radius: 4px;
}
.pd__cta-title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(1.15rem, 2vw, 1.4rem);
  letter-spacing: -0.02em; color: var(--ink);
  line-height: 1.12; margin: 8px 0 10px;
}
.pd__cta-body {
  font-size: 14px; line-height: 1.65;
  color: rgba(17,17,16,0.68);
  margin: 0 0 16px;
}
.pd__cta-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.pd__cta-actions .btn { width: 100%; justify-content: center; }
.pd__cta-direct {
  display: flex; flex-direction: column; gap: 10px;
  padding-top: 16px;
  border-top: 1px solid rgba(17,17,16,0.08);
}
.pd__cta-link {
  display: inline-flex; align-items: center; gap: 10px;
  color: var(--graphite); text-decoration: none;
  font-size: 14px; font-weight: 600;
}
.pd__cta-link:hover { color: var(--red); }
.pd__cta-link svg { width: 16px; height: 16px; stroke-width: 1.75; }
.pd__colors { display: flex; gap: 16px; align-items: center; padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.pd__swatches { display: flex; gap: 8px; }
.swatch { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); display: inline-block; cursor: pointer; }
.spec-block { margin-bottom: 28px; }
.spec-block > .meta { display: block; margin-bottom: 10px; }
.spec-table { width: 100%; border-collapse: collapse; font-size: 13.5px; font-variant-numeric: tabular-nums; }
.spec-table td { padding: 10px 0; border-bottom: 1px solid var(--border); }
.spec-table td.k { color: rgba(17,17,16,0.72); width: 52%; }
.spec-table td.v { color: var(--ink); font-family: var(--font-mono); text-align: right; }
.pd__mat > .meta { display: block; margin-bottom: 10px; }
.pd__matlist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.pd__matlist li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(17,17,16,0.74); }
.pd__matlist svg { width: 16px; height: 16px; color: var(--red); stroke-width: 2; }

/* ---------- ABOUT ---------- */
.about__head { max-width: 800px; margin-bottom: var(--space-8); }
.about__title { font-family: var(--font-display); font-weight: 700; font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: -0.035em; color: var(--ink); line-height: 1.02; margin: 16px 0 24px; text-wrap: balance; }
.about__lead { max-width: 58ch; }

.about__facts {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
  margin-bottom: var(--space-9);
}
.about__fact {
  background: var(--paper); padding: 28px 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.about__fact-v { font-family: var(--font-display); font-weight: 700; font-size: 28px; color: var(--ink); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.about__fact-k { font-family: var(--font-mono); font-size: 10.5px; color: var(--slate); letter-spacing: 0.08em; text-transform: uppercase; }

.about__markets { margin-bottom: var(--space-9); }
.about__markets h2 { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.75rem, 3vw, 2.5rem); letter-spacing: -0.025em; color: var(--ink); line-height: 1.05; margin: 0 0 28px; }
.about__market-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
.market ul { list-style: none; margin: 10px 0 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.market li { font-size: 15px; color: var(--graphite); padding: 6px 0; border-bottom: 1px solid var(--border); }

.about__cert {
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: center;
  background: var(--bone); border-radius: 4px; padding: 40px;
}
.about__cert-body { color: var(--slate); max-width: 50ch; margin: 10px 0 0; }
.about__cert-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.about__cert-grid--6 { grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 960px) { .about__cert-grid--6 { grid-template-columns: repeat(2, 1fr); } }
.cert-chip {
  font-family: var(--font-display); font-weight: 700; font-size: 16px;
  letter-spacing: 0.04em; color: var(--ink);
  padding: 20px 16px; background: var(--paper-soft);
  border: 1px solid var(--border); border-radius: 2px;
  text-align: center;
}
.cert-chip--sm { padding: 4px 10px; font-size: 11px; letter-spacing: 0.08em; font-weight: 600; }

/* ---------- CONTACT ---------- */
.contact { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; }
.contact__title { font-family: var(--font-display); font-weight: 700; font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.03em; color: var(--ink); line-height: 1.05; margin: 14px 0 20px; text-wrap: balance; }
.contact__cta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
.contact__direct { padding: 24px 28px; background: var(--paper-soft); border: 1px solid var(--border); border-radius: 4px; }
.contact__direct ul { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
.contact__direct li { display: flex; align-items: center; gap: 10px; font-size: 14.5px; color: var(--graphite); }
.contact__direct svg { width: 18px; height: 18px; color: var(--slate); stroke-width: 1.75; flex-shrink: 0; }

.contact__process {
  margin-top: var(--space-8);
  padding: 40px 0 0; border-top: 1px solid var(--border);
}
.contact__process .eyebrow { display: block; margin-bottom: 20px; }
.contact__process-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
}
.contact-step {
  display: flex; flex-direction: column; gap: 10px;
  padding-top: 16px; border-top: 2px solid var(--ink);
}
.contact-step__n {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.18em; color: var(--red);
}
.contact-step__k {
  font-family: var(--font-display); font-weight: 700;
  font-size: 17px; color: var(--ink); line-height: 1.2;
}
.contact-step__v { color: var(--slate); font-size: 14px; line-height: 1.55; margin: 0; }

.contact__map {
  margin-top: var(--space-8);
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--paper-soft); overflow: hidden;
}
.contact__map-head {
  display: flex; justify-content: space-between; align-items: center;
  gap: 20px; padding: 20px 28px;
  background: var(--paper); border-bottom: 1px solid var(--border);
}
.contact__map-note { margin: 6px 0 0; font-size: 14px; color: var(--graphite); }
.contact__map-frame {
  width: 100%; height: 420px; border: 0; display: block;
  background: var(--bone);
}

@media (max-width: 720px) {
  .contact__process-grid { grid-template-columns: 1fr 1fr; gap: 18px; }
  .contact__map-head { flex-direction: column; align-items: stretch; padding: 16px; gap: 10px; }
  .contact__map-frame { height: 320px; }
}
@media (max-width: 480px) {
  .contact__process-grid { grid-template-columns: 1fr; }
}

/* ---------- CATALOG PAGE ---------- */
.catalog-page {
  display: grid;
  grid-template-columns: minmax(0, 0.95fr) minmax(300px, 0.8fr);
  gap: clamp(36px, 5vw, 72px);
  align-items: start;
  margin-bottom: var(--space-9);
}
.catalog-page__hero {
  max-width: 680px;
  padding-top: 8px;
}
.catalog-page__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(2.25rem, 4.6vw, 3.75rem);
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 0.98;
  margin: 16px 0 18px;
  text-wrap: balance;
  word-break: normal;
  overflow-wrap: normal;
  hyphens: none;
}
.catalog-page__lead {
  max-width: 58ch;
  margin: 0;
  color: rgba(17,17,16,0.68);
}
.catalog-page__facts {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1px;
  max-width: 560px;
  margin: 24px 0;
  border: 1px solid var(--border);
  background: var(--border);
}
.catalog-page__fact {
  min-height: 72px;
  padding: 14px 16px;
  background: rgba(247,246,243,0.96);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
}
.catalog-page__fact strong {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  color: var(--ink);
  letter-spacing: -0.015em;
}
.catalog-gate { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; max-width: 420px; }
.catalog-gate__row { display: flex; gap: 16px; align-items: center; }
.catalog-downloaded { display: flex; align-items: center; gap: 10px; color: var(--success); font-weight: 600; margin-top: 24px; }
.catalog-downloaded svg { width: 20px; height: 20px; }

.catalog-cover {
  aspect-ratio: 3/4; background: var(--paper-soft);
  border: 1px solid var(--border); box-shadow: var(--shadow-3);
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 32px; border-radius: 2px;
}
.catalog-cover__band { display: flex; justify-content: space-between; align-items: baseline; }
.catalog-cover__year { font-family: var(--font-display); font-weight: 700; font-size: 80px; letter-spacing: -0.04em; line-height: 1; color: var(--red); }
.catalog-cover__label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; color: var(--slate); }
.catalog-cover__logo { width: auto; height: 68px; align-self: center; margin-top: 20px; }
.catalog-cover__grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-top: 24px;
}
.catalog-cover__grid img {
  width: 100%; aspect-ratio: 1/1;
  object-fit: cover; border-radius: 2px;
  box-shadow: var(--shadow-1);
  transition: transform var(--dur-med) var(--ease-out);
}
.catalog-cover__grid img:hover { transform: scale(1.02); }
.catalog-cover__foot { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 20px; }

/* pdf.js + StPageFlip catalog flipbook */
.flipbook {
  margin: var(--space-8) 0 var(--space-9);
  background: var(--paper-soft);
  border: 1px solid var(--border);
  border-radius: 4px;
  box-shadow: var(--shadow-2);
  overflow: hidden;
}
.flipbook__head {
  display: flex; justify-content: space-between; align-items: center;
  gap: 20px; padding: 20px 28px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
}
.flipbook__head .eyebrow { display: block; margin-bottom: 6px; }
.flipbook__hint { font-size: 13px; color: var(--slate); }
.flipbook__actions { display: flex; gap: 8px; flex-wrap: wrap; }
.flipbook__stage {
  position: relative;
  min-height: 72vh;
  display: grid; place-items: center;
  padding: 28px;
  background:
    radial-gradient(circle at 50% 40%, rgba(0,0,0,0.03), transparent 60%),
    var(--bone);
}
.flipbook__container {
  width: 100%;
  max-width: 1080px;
  aspect-ratio: 4 / 3;
}
.flipbook__container canvas { display: block; width: 100%; height: auto; }
.flipbook__page { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.flipbook__status {
  position: absolute; inset: 0;
  display: grid; place-items: center; gap: 12px;
  grid-auto-rows: min-content; align-content: center;

/* ============================================================
   RESPONSIVE — mobile-first refinements
   Breakpoints:
     1100px  → header slogan hidden (already)
      960px  → tablet: 1-column hero, 2-col cats, hamburger menu
      720px  → phone: compact spacing, stacked forms
      480px  → narrow phone: single column everywhere
   ============================================================ */
@media (max-width: 960px) {
  :root { --page-gutter: clamp(16px, 4vw, 24px); }
  body { overflow-x: hidden; }

  /* Header — hide desktop nav and show mobile hamburger */
  .site-header__nav { display: none; }
  .site-header__slogan { display: none; }
  .site-header__inner { grid-template-columns: auto 1fr auto; gap: 16px; padding: 12px var(--page-gutter); height: 64px; }
  .site-header__brand img { height: 36px; }
  .mobile-menu-btn { display: inline-flex !important; }
  .mobile-menu-btn + .lang-switch { margin-right: 4px; }

  /* Hero — stacked, tight spacing */
  .hero { padding-top: 0; }
  .hero__title { font-size: clamp(3rem, 13vw, 5.5rem); line-height: 0.92; letter-spacing: -0.035em; max-width: none; }
  .hero__body { font-size: 16.5px; max-width: none; }
  .hero__cta { gap: 12px; }
  .hero__cta .btn { width: auto; }
  .hero__visual { height: clamp(260px, 44vh, 440px); padding: 0 var(--page-gutter); margin-bottom: var(--space-6); }
  .hero__visual::before { inset: 0 var(--page-gutter); }
  .hero__visual::after { inset: 10px calc(var(--page-gutter) + 10px); }
  .hero__photo-stack { inset: 10px calc(var(--page-gutter) + 10px); }
  .hero__ring { display: none; }
  .hero__visual-crop { top: 22px; left: calc(var(--page-gutter) + 22px); font-size: 9.5px; padding: 4px 8px; }
  .hero__photo-nav { bottom: 22px; right: calc(var(--page-gutter) + 22px); }
  .deco-reg { display: none; }

  /* Stats — 2 column with horizontal dividers */
  .stats-strip__inner { grid-template-columns: 1fr 1fr; }
  .stats-strip__item:nth-child(2) { border-right: 0; }
  .stats-strip__item { border-bottom: 1px solid var(--border); padding: 24px 20px; }
  .stats-strip__item:nth-child(3), .stats-strip__item:nth-child(4) { border-bottom: 0; }
  .stats-strip__item:not(:first-child) { padding-left: 20px; }
  .stats-strip__item:nth-child(3) { padding-left: 0; }

  /* Section heads + bands */
  .section { padding: var(--space-7) var(--page-gutter); }
  .section__head { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: var(--space-6); }
  .section__title { font-size: clamp(1.75rem, 7vw, 2.5rem); max-width: none; }

  /* References */
  .references-preview__panel { grid-template-columns: 1fr; gap: 24px; }
  .references-page__grid { grid-template-columns: repeat(3, minmax(0, 1fr)); max-width: none; }

  /* Categories — 2 columns on tablet */
  .cat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .cat-grid .cat-card { grid-column: auto !important; }

  /* Bands (production + catalog) */
  .band { grid-template-columns: 1fr; gap: 28px; padding: var(--space-7) var(--page-gutter); }
  .band__title { font-size: clamp(1.75rem, 7vw, 2.5rem); }
  .band__facts { grid-template-columns: 1fr 1fr; }
  .fact { padding: 18px 16px; }
  .fact__v { font-size: 22px; }
  .catalog-band { grid-template-columns: 1fr; gap: 24px; padding: 28px; }
  .catalog-band__right { align-items: flex-start; width: 100%; }
  .catalog-band__right .btn { width: 100%; justify-content: center; }

  /* Product grid — 2 col */
  .products-toolbar { grid-template-columns: 1fr 220px; }
  .products-toolbar__meta { grid-column: 1 / -1; justify-content: flex-start; min-height: auto; }
  .product-grid { grid-template-columns: repeat(2, 1fr); gap: 24px 16px; }
  .product-care__head { flex-direction: column; align-items: flex-start; gap: 12px; }
  .product-care__grid { grid-template-columns: 1fr; }
  .product-care__highlights { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .product-card__name { font-size: 15px; }
  .filter-row { gap: 6px; flex-wrap: wrap; }
  .chip { flex-shrink: 0; }

  /* Product detail */
  .pd { grid-template-columns: 1fr; gap: 32px; }
  .pd__info { position: static; }
  .pd__title { font-size: clamp(1.5rem, 6vw, 2rem); }
  .pd__hero { min-height: 0; }
  .pd__summary { grid-template-columns: 1fr 1fr 1fr; }
  .pd__cta-actions { grid-template-columns: 1fr; }

  /* About */
  .about__facts { grid-template-columns: repeat(2, 1fr); }
  .about__fact { padding: 20px 14px; }
  .about__fact-v { font-size: 22px; }
  .about__market-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .about__cert { grid-template-columns: 1fr; gap: 20px; padding: 28px 20px; }
  .about__title { font-size: clamp(2rem, 8vw, 3rem); }

  /* Contact */
  .contact { grid-template-columns: 1fr; gap: 36px; }
  .contact__title { font-size: clamp(1.75rem, 7vw, 2.5rem); }

  /* Catalog */
  .catalog-page { grid-template-columns: 1fr; gap: 32px; }
  .catalog-page__hero { max-width: none; padding-top: 0; }
  .catalog-page__title { font-size: clamp(2rem, 8vw, 2.85rem); max-width: 12em; }
  .catalog-cover { padding: 24px; }
  .catalog-cover__year { font-size: 56px; }

  .catalog-gate__row .btn { width: 100%; justify-content: center; }
  .catalog-contents { padding: 28px 20px; }

  .btn { min-height: 42px; }

  .lang-switch button { min-height: 44px; min-width: 44px; padding: 6px 8px; }
  .site-header__nav a { padding: 10px 0; }

@media (max-width: 720px) {
  .hero__title { font-size: clamp(2.5rem, 12vw, 4.5rem); }

  .hero__visual { height: clamp(220px, 38vh, 360px); }

  .stats-strip__small { font-size: 10px; }

  .references-page__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

  .reference-logo img { max-height: 68px; }
