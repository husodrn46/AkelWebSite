/* ====== Header.jsx ====== */
// Header.jsx — sticky site header with bilingual switcher
function Header({ lang, setLang, currentPath, navigate }) {
  const nav = {
    tr: [
      { label: 'Ürünler', path: 'products' },
      { label: 'Katalog', path: 'catalog' },
      { label: 'Hakkımızda', path: 'about' },
      { label: 'İletişim', path: 'contact' },
    ],
    en: [
      { label: 'Products', path: 'products' },
      { label: 'Catalog', path: 'catalog' },
      { label: 'About', path: 'about' },
      { label: 'Contact', path: 'contact' },
    ],
  }[lang];

  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    const el = document.querySelector('.kit-scroll') || window;
    const onScroll = () => {
      const y = el === window ? window.scrollY : el.scrollTop;
      setScrolled(y > 8);
    };
    el.addEventListener('scroll', onScroll);
    return () => el.removeEventListener('scroll', onScroll);
  }, []);
  // Close menu on route change or Esc
  React.useEffect(() => { setMenuOpen(false); }, [currentPath]);
  React.useEffect(() => {
    if (!menuOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') setMenuOpen(false); };
    document.addEventListener('keydown', onKey);
    const scrollEl = document.querySelector('.kit-scroll');
    const prevBody = document.body.style.overflow;
    const prevScroll = scrollEl ? scrollEl.style.overflow : '';
    document.body.style.overflow = 'hidden';
    if (scrollEl) scrollEl.style.overflow = 'hidden';
    if (window.lucide) window.lucide.createIcons();
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = prevBody;
      if (scrollEl) scrollEl.style.overflow = prevScroll;
    };
  }, [menuOpen]);

  const goto = (p) => { setMenuOpen(false); navigate(p); };

  return (
    <header className={`site-header ${scrolled ? 'is-scrolled' : ''} ${menuOpen ? 'is-menu-open' : ''}`}>
      <div className="site-header__inner">
        <a
          className="site-header__brand"
          href="#/"
          onClick={(e) => { e.preventDefault(); goto('home'); }}
          title="Akel Melamin Plastik San.Tic.Ltd.Şti."
          aria-label="Akel Melamin — anasayfa"
        >
          <img src="./img/akel-logo-cropped.png" alt="Akel Melamin" width="160" height="79" decoding="async" />
          <span className="site-header__slogan pull-serif" aria-hidden="true">
            {lang === 'tr' ? 'Her sofrada kaliteye yer açın.' : 'Make room for quality at every table.'}
          </span>
        </a>
        <nav className="site-header__nav" aria-label={lang === 'tr' ? 'Ana menü' : 'Main menu'}>
          {nav.map((item) => (
            <a
              key={item.path}
              href={`#/${item.path}`}
              className={currentPath === item.path ? 'is-active' : ''}
              onClick={(e) => { e.preventDefault(); goto(item.path); }}
              aria-current={currentPath === item.path ? 'page' : undefined}
            >
              {item.label}
            </a>
          ))}
        </nav>
        <div className="site-header__actions">
          <LangSwitch lang={lang} setLang={setLang} />
          <button type="button"
            className="btn btn--primary btn--sm site-header__cta"
            onClick={() => goto('catalog')}
          >
            {lang === 'tr' ? 'Katalog' : 'Catalog'}
            <i data-lucide="download"></i>
          </button>
          <button type="button"
            className="mobile-menu-btn"
            aria-label={lang === 'tr' ? 'Menüyü aç' : 'Open menu'}

// ProductGrid.jsx — category listing with real Gözde/Kavi lines + variant swatch
function ProductGrid({ lang, navigate, openProduct }) {
  const [active, setActive] = React.useState('all');
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(null);

  React.useEffect(() => {
    fetch('./data/products.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(setData)
      .catch(e => setErr(e.message));
  }, []);

  const t = lang === 'tr'
    ? { title: 'Tüm ürünler', count: (n) => `${n} ürün`, empty: 'Henüz ürün eklenmedi.', loading: 'Yükleniyor…', all: 'Tümü', errorLabel: 'Ürünler yüklenemedi:' }
    : { title: 'All products', count: (n) => `${n} products`, empty: 'No products yet.', loading: 'Loading…', all: 'All', errorLabel: 'Could not load products:' };

  if (err) {
    return (
      <section className="section">
        <div className="section__head">
          <h2 className="section__title">{t.title}</h2>
        </div>
        <p className="lead">{t.errorLabel} <code>{err}</code></p>
      </section>
    );
  }
  if (!data) {
    return (
      <section className="section">
        <div className="section__head">
          <h2 className="section__title">{t.title}</h2>
        </div>
        <p className="lead">{t.loading}</p>
      </section>
    );
  }

  // Only active products
  const visible = data.products.filter(p => (p.aktif || 'evet') !== 'hayir');

  // Filter chips: derive from categories actually present in data
  const usedCats = new Set(visible.map(p => p.kategori));
  const filters = [
    { k: 'all', l: t.all },
    ...data.categories.filter(c => usedCats.has(c.key)).map(c => ({ k: c.key, l: c[lang] }))
  ];

  const shown = active === 'all' ? visible : visible.filter(p => p.kategori === active);

  // Build a per-product spec line out of sized fields
  function buildSpec(p) {
    const parts = [];
    if (p.boyut) parts.push(p.boyut);
    else if (p.cap_mm) parts.push('Ø ' + (p.cap_mm / 10) + ' cm');
    else if (p.en_mm && p.boy_mm) parts.push((p.en_mm/10) + '×' + (p.boy_mm/10) + ' cm');
    if (p.agirlik_g) parts.push(p.agirlik_g + ' g');
    if (p.koli_adet) parts.push((lang === 'tr' ? 'Koli ' : 'Carton ') + p.koli_adet);
    return parts.join(' · ');
  }

  function catLabel(k) {
    const c = data.categories.find(x => x.key === k);
    return c ? c[lang] : k;
  }

  return (
    <section className="section" data-anim="section">
      <div className="section__head">
        <div>

    ? {
        back: '← Ürünlere dön',
        request: 'Teklif iste',
        specs: 'Teknik özellikler',
        pack: 'Ambalaj ve lojistik',
        materials: 'Malzeme ve sertifikalar',
        matList: ['%100 melamin reçine', 'ISO 22000:2018 gıda güvenliği', 'Intertek test raporlu', 'Bulaşık makinesi uyumlu', '−20°C / +100°C kullanım'],
        images: 'Stüdyo referans görseli',
        color: 'Renk', useArea: 'Kullanım alanı', logo: 'Özel logolu',
        yes: 'Evet', no: 'Hayır',
      }
    : {
        back: '← Back to products',
        request: 'Request quote',
        specs: 'Technical specs',
        pack: 'Packaging & logistics',
        materials: 'Material & certifications',
        matList: ['100% melamine resin', 'ISO 22000:2018 food safety', 'Intertek-tested', 'Dishwasher safe', '−20°C to +100°C use'],
        images: 'Studio reference image',
        color: 'Color', useArea: 'Use area', logo: 'Custom logo',
        yes: 'Yes', no: 'No',
      };

  // Build spec rows from structured fields
  function dim() {
    if (product.cap_mm) return 'Ø ' + (product.cap_mm / 10) + ' cm';
    const parts = [];
    if (product.en_mm) parts.push(product.en_mm / 10);
    if (product.boy_mm) parts.push(product.boy_mm / 10);
    if (product.yukseklik_mm) parts.push(product.yukseklik_mm / 10);
    return parts.length ? parts.join(' × ') + ' cm' : (product.boyut || '—');
  }

  const colorLabel = product.renk
    ? (lang === 'tr'
        ? { beyaz: 'Beyaz', siyah: 'Siyah', desenli: 'Desenli', kirmizi: 'Kırmızı', mavi: 'Mavi', yesil: 'Yeşil' }[product.renk] || product.renk
        : { beyaz: 'White', siyah: 'Black', desenli: 'Patterned', kirmizi: 'Red', mavi: 'Blue', yesil: 'Green' }[product.renk] || product.renk)
    : '—';

  const rows = [
    [lang === 'tr' ? 'Boyutlar' : 'Dimensions', dim()],
    [lang === 'tr' ? 'Ağırlık' : 'Weight',      product.agirlik_g ? product.agirlik_g + ' g' : '—'],
    ['SKU',                                      product.sku],
    [t.color,                                    colorLabel],
  ];
  if (product.barkod) rows.push([lang === 'tr' ? 'Barkod' : 'Barcode', product.barkod]);

  const pack = [
    [lang === 'tr' ? 'Kolide adet' : 'Pieces per carton', product.koli_adet || '—'],
    [lang === 'tr' ? 'Koli boyutu' : 'Carton dimensions', product.koli_cm || '—'],
    [lang === 'tr' ? 'Koli brüt'   : 'Carton gross',      product.koli_agirlik_kg ? product.koli_agirlik_kg + ' kg' : '—'],
  ];
  if (product.ozel_logolu_uygun) pack.push([t.logo, product.ozel_logolu_uygun === 'evet' ? t.yes : t.no]);
  if (product.kullanim_alani) pack.push([t.useArea, product.kullanim_alani]);

  const photoSrc = product.foto_dosya_adi ? `./img/${product.foto_dosya_adi}.jpg` : null;

  return (
    <section className="section" data-anim="section">
      <button type="button" className="btn btn--link" onClick={onBack}>{t.back}</button>

      <div className="pd">
        <div className="pd__gallery" data-anim="fade-up">
          <div className="pd__hero" aria-hidden="true">
            {photoSrc
              ? <img className="pd__photo" src={photoSrc}
                     alt={lang === 'tr' ? product.ad_tr : (product.ad_en || product.ad_tr)}
                     width="800" height="800" decoding="async"
                     onError={(e) => {
                       if (!e.target.__triedPng) {
                         e.target.__triedPng = true;
                         e.target.src = `./img/${product.foto_dosya_adi}.png`;
                       } else { e.target.style.display = 'none'; }
                     }} />
              : <div className={`plate plate--${product.kategori} plate--xl`}></div>}
            <span className="pd__caption meta">{t.images}</span>
          </div>
        </div>

        <div className="pd__info" data-anim="fade-up" data-anim-delay="80">
          <span className="eyebrow">{(product.kategori || '').toUpperCase()}</span>
          <h1 className="pd__title">{lang === 'tr' ? product.ad_tr : (product.ad_en || product.ad_tr)}</h1>
          {(lang === 'tr' ? product.aciklama_tr : product.aciklama_en) && (
            <p className="pd__spec lead">{lang === 'tr' ? product.aciklama_tr : product.aciklama_en}</p>

          <div className="pd__cta">
            <button type="button" className="btn btn--primary btn--lg magnetic" onClick={onBack}>{t.request} →</button>

          <SpecBlock title={t.specs} rows={rows} />

          <div className="pd__mat">
            <span className="meta">{t.materials}</span>
            <ul className="pd__matlist">
              {t.matList.map((m, i) => (
                <li key={i}><i data-lucide="check"></i> {m}</li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
}

                  <button type="button" className="btn btn--link" onClick={trigger}>
                    {t.skip} →
                  </button>
                </div>
              </form>
            ) : (
              <div className="catalog-downloaded">
                <i data-lucide="check-circle"></i>
                <span>{downloaded ? t.downloaded : (lang === 'tr' ? 'İndirildi.' : 'Downloaded.')}</span>
              </div>
            )}
          </div>
        </div>

        <div className="catalog-page__cover" data-anim="fade-up" data-anim-delay="120">
          <div className="catalog-cover">
            <div className="catalog-cover__band">
              <span className="catalog-cover__year">2026</span>
              <span className="catalog-cover__label">v23 · KATALOG</span>
            </div>
            <img className="catalog-cover__logo" src="./img/akel-logo-cropped.png" alt="Akel Melamin logosu" width="200" height="99" decoding="async" />
            <div className="catalog-cover__foot">
              <span className="meta">56 pp · EN · TR · 6,3 MB</span>
            </div>
          </div>
        </div>
      </div>

      {/* ---- PDF preview — opt-in via button, not open by default ---- */}
      <CatalogPreview lang={lang} pdfUrl={pdfUrl} />

      <div className="catalog-contents" data-anim="fade-up">
        <span className="eyebrow">{t.what}</span>
        <ul data-anim-stagger>
          {t.rows.map((r, i) => (
            <li key={i} data-anim="stagger-item"><span className="catalog-contents__n">{String(i+1).padStart(2,'0')}</span> {r}</li>
          ))}
        </ul>
      </div>
    </section>
  );
}

// Opt-in PDF viewer — user clicks "Önizle" to load the iframe. Keeps initial
// page light (no 6MB fetch on catalog route entry).
function CatalogPreview({ lang, pdfUrl }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    if (open && window.lucide) window.lucide.createIcons();
  }, [open]);
  const t = lang === 'tr'
    ? { open: 'Önizlemeyi aç', close: 'Önizlemeyi kapat', hint: '56 sayfa · 6,3 MB PDF — açmak isteğe bağlıdır.',
        openTab: 'Yeni sekmede aç', download: 'İndir',
        title: 'Melamin Servis Ekipmanları 2026 · v23' }
    : { open: 'Open preview', close: 'Close preview', hint: '56 pages · 6.3 MB PDF — opening is optional.',
        openTab: 'Open in new tab', download: 'Download',
        title: 'Melamine Service Equipment 2026 · v23' };
  return (
    <div className={`catalog-viewer ${open ? 'is-open' : ''}`} data-anim="fade-up">
      <div className="catalog-viewer__head">
        <div className="catalog-viewer__heading">
          <span className="eyebrow">{lang === 'tr' ? 'Önizleme' : 'Preview'}</span>
          <h3 className="h3">{t.title}</h3>
          <span className="catalog-viewer__hint">{t.hint}</span>
        </div>
        <div className="catalog-viewer__actions">
          <button type="button"
            className="btn btn--primary btn--sm magnetic"
            onClick={() => setOpen(o => !o)}
            aria-expanded={open}
          >
            <i data-lucide={open ? 'x' : 'eye'}></i> {open ? t.close : t.open}
          </button>
          <a className="btn btn--ghost btn--sm" href={pdfUrl} target="_blank" rel="noopener">
            <i data-lucide="external-link"></i> {t.openTab}
          </a>
          <a className="btn btn--ghost btn--sm" href={pdfUrl} download="Akel-Melamin-Katalog-2026.pdf">
            <i data-lucide="download"></i> {t.download}
          </a>
        </div>
      </div>
      {open && (
        <object
          className="catalog-viewer__frame"
          data={pdfUrl + '#view=FitH&toolbar=1&navpanes=0'}
          type="application/pdf"
        >
          <iframe
            src={pdfUrl + '#view=FitH'}
            title="Akel Katalog 2026"
            loading="lazy"
          ></iframe>
          <p className="catalog-viewer__fallback">
            {lang === 'tr'
              ? 'Tarayıcın PDF gömmeyi desteklemiyor. '
              : 'Your browser does not support embedded PDFs. '}
            <a href={pdfUrl} download>{lang === 'tr' ? 'Kataloğu indir' : 'Download the catalog'}</a>.
          </p>
        </object>
      )}
    </div>
  );
}

window.CatalogPreview = CatalogPreview;
window.CatalogPage = CatalogPage;

/* ====== App.jsx ====== */
function App() {
  const [lang, setLang] = React.useState(() => localStorage.getItem('akel-lang') || 'tr');
  const [path, setPath] = React.useState(() => localStorage.getItem('akel-path') || 'home');
  const [product, setProduct] = React.useState(null);
  React.useEffect(() => { localStorage.setItem('akel-lang', lang); document.documentElement.lang = lang; }, [lang]);
  React.useEffect(() => { localStorage.setItem('akel-path', path); }, [path]);
  const navigate = (p) => { setPath(p); setProduct(null); requestAnimationFrame(() => { const s = document.querySelector('.kit-scroll'); if (s) s.scrollTop = 0; }); };
  const openProduct = (p) => { setProduct(p); setPath('product'); requestAnimationFrame(() => { const s = document.querySelector('.kit-scroll'); if (s) s.scrollTop = 0; }); };
  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
    if (window.__akelAnimations) window.__akelAnimations.init(document);
  }, [path, lang, product]);
  return (
    <div className="kit-scroll" data-screen-label={`Akel · ${path}`}>
      <a href="#main" className="skip-link" onClick={(e) => { e.preventDefault(); const m = document.getElementById('main'); if (m) m.focus(); }}>
        {lang === 'tr' ? 'İçeriğe geç' : 'Skip to content'}
      </a>
      <Header lang={lang} setLang={setLang} currentPath={path} navigate={navigate} />
      <main id="main" tabIndex="-1">
      {path === 'home' && <>
        <Hero lang={lang} navigate={navigate} />
        <StatsRow lang={lang} />
        <Categories lang={lang} navigate={navigate} />
        <ProductionBand lang={lang} navigate={navigate} />
        <CatalogBand lang={lang} navigate={navigate} />
      </>}
      {path === 'products' && <ProductGrid lang={lang} navigate={navigate} openProduct={openProduct} />}
      {path === 'product' && product && <ProductDetail lang={lang} product={product} onBack={() => setPath('products')} />}
      {path === 'about' && <About lang={lang} navigate={navigate} />}
      {path === 'contact' && <Contact lang={lang} />}
      {path === 'catalog' && <CatalogPage lang={lang} navigate={navigate} />}
      </main>
      <Footer lang={lang} navigate={navigate} />
      <ScrollToTop lang={lang} />
    </div>
  );
}

function ScrollToTop({ lang }) {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const el = document.querySelector('.kit-scroll');
    const onScroll = () => { setShow((el ? el.scrollTop : window.scrollY) > 800); };
    (el || window).addEventListener('scroll', onScroll, { passive: true });
    return () => (el || window).removeEventListener('scroll', onScroll);
  }, []);
  const up = () => {
    const el = document.querySelector('.kit-scroll');
    if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
    else window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  return (
    <button
      type="button"
      className={`scroll-top ${show ? 'is-on' : ''}`}
      aria-label={lang === 'tr' ? 'Yukarı çık' : 'Back to top'}
      onClick={up}
    >
      <i data-lucide="arrow-up"></i>
    </button>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
