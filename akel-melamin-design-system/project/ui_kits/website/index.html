  .product-card__ph { aspect-ratio: 1/1; }
  .about__facts { grid-template-columns: 1fr 1fr; }
  .band__facts { grid-template-columns: 1fr; }
  .site-footer__brand img { width: 148px; }
}

@media (max-width: 480px) {
  :root { --page-gutter: 16px; }
  .hero { padding-top: 0; }
  .hero__title { font-size: clamp(2.25rem, 11vw, 3.75rem); margin: 12px 0 20px; }
  .hero__body { margin-bottom: 24px; }
  .hero__cta { flex-direction: column; align-items: stretch; width: 100%; }
  .hero__cta .btn { width: 100%; justify-content: center; }

  .hero__visual-crop { display: none; }

  .stats-strip__inner { grid-template-columns: 1fr; }
  .stats-strip__item { border-right: 0 !important; padding: 18px 16px !important; border-bottom: 1px solid var(--border) !important; }
  .stats-strip__item:last-child { border-bottom: 0 !important; }

  .cat-grid { grid-template-columns: 1fr; }
  .cat-grid .cat-card { grid-column: auto !important; }
  .catalog-page__title {
    font-size: clamp(2rem, 8.2vw, 2.35rem);
    line-height: 1.02;
    letter-spacing: -0.025em;
    max-width: none;
  }
  .catalog-page__lead { font-size: 15.5px; line-height: 1.55; }
  .catalog-page__facts { grid-template-columns: 1fr; margin: 18px 0; }
  .catalog-page__fact { min-height: 58px; padding: 12px 14px; }
  .catalog-page__action .btn { width: 100%; justify-content: center; }
  .reference-logo-grid,
  .references-page__grid { grid-template-columns: 1fr; }
  .reference-logo { min-height: 96px; }
  .products-toolbar { grid-template-columns: 1fr; gap: 12px; }
  .products-toolbar__meta { justify-content: flex-start; }
  .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 12px; }
  .product-care__highlights { grid-template-columns: 1fr; }
  .product-card__body { padding: 10px 2px 0; gap: 4px; }
  .product-card__eyebrow { font-size: 9px; letter-spacing: 0.1em; }
  .product-card__name { font-size: 14px; line-height: 1.22; }
  .product-card__spec { font-size: 10px; line-height: 1.45; }
  .product-card__code { top: 10px; right: 10px; font-size: 9.5px; padding: 3px 7px; }
  .about__market-grid { grid-template-columns: 1fr; }
  .about__facts { grid-template-columns: 1fr 1fr; }
  .pd__summary { grid-template-columns: 1fr; }

  .site-footer__top { grid-template-columns: 1fr; gap: 28px; }
  .site-footer__brand { grid-column: span 1; }


  /* Buttons full-width on narrow */
  .section__head .btn--link { font-size: 14px; }

  /* Disable decorative floaters on tiny screens */
  .deco-reg, .deco-arrow { display: none; }
  /* Hide grain overlay entirely on small — improves performance */
  .kit-scroll::after { display: none; }
}

/* Disable hover-only animations on touch devices regardless of width */
@media (hover: none) {
  .cat-card::before { display: none; }
  .cat-card:hover { transform: none; }
  .cat-card:hover .cat-card__ph {
    transform: none;
    border-color: rgba(17,17,16,0.2);

      var(--shadow-1);
  }
  .tilt { transform: none !important; }
  .btn--primary::before { display: none; }
}

<script>// animations.js — scroll-triggered reveals, count-up, magnetic hover.

  const PREFERS_REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const IS_NARROW = window.matchMedia('(max-width: 720px)').matches;

    const scrollRoot = null;

        const el = e.target;

            const siblings = [...parent.querySelectorAll('[data-anim="stagger-item"]')];
            const idx = siblings.indexOf(el);
            el.style.transitionDelay = (idx * 60) + 'ms';
          }
        } else {
          const d = parseInt(el.getAttribute('data-anim-delay') || '0', 10);
          if (d) el.style.transitionDelay = d + 'ms';

        el.classList.add('anim-in');
        io.unobserve(el);

      const r = el.getBoundingClientRect();
      const vh = window.innerHeight;
      return r.top < vh * 0.98 && r.bottom > 0;

    update();
  }

  // Split-text: wrap each letter of [data-split-text] into .letter spans
  function setupSplitText(root) {
    root.querySelectorAll('[data-split-text]').forEach(el => {
      if (el.__splitDone) return;
      el.__splitDone = true;
      const text = el.textContent;
      el.textContent = '';
      el.setAttribute('aria-label', text);
      el.classList.add('split-text');
      [...text].forEach((ch, i) => {
        const s = document.createElement('span');
        s.className = 'letter';
        s.setAttribute('data-char', ch);
        s.setAttribute('aria-hidden', 'true');
        s.style.transitionDelay = (i * 22) + 'ms';
        s.textContent = ch === ' ' ? '\u00A0' : ch;
        el.appendChild(s);
      });
    });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('is-in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.2 });
    // Above-the-fold titles: reveal on the next frame so the stagger fires
    // predictably on route change (Contact, Catalog, ProductDetail — where
    // the title is the first thing the user sees). Below-the-fold titles
    // still wait for the IO.
    requestAnimationFrame(() => {
      root.querySelectorAll('.split-text').forEach(el => {
        if (el.classList.contains('is-in')) return;
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight * 0.95 && r.bottom > 0) {
          el.classList.add('is-in');
        } else {
          io.observe(el);
        }
      });
    });

    // Safety: if IntersectionObserver somehow misses an element, reveal
    // after 2s so text never stays hidden.
    setTimeout(() => {
      root.querySelectorAll('.split-text').forEach(el => el.classList.add('is-in'));
    }, 2000);
  }

  // Tilt — mouse-parallax 3D for .tilt elements
  function setupTilt(root) {
    if (PREFERS_REDUCED || IS_NARROW) return;
    root.querySelectorAll('.tilt').forEach(el => {
      if (el.__tiltInit) return;
      el.__tiltInit = true;
      el.addEventListener('pointermove', (e) => {
        const r = el.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (e.clientX - cx) / r.width;
        const dy = (e.clientY - cy) / r.height;
        el.style.transform = `perspective(800px) rotateX(${-dy * 6}deg) rotateY(${dx * 8}deg)`;
      });
      el.addEventListener('pointerleave', () => {
        el.style.transform = 'perspective(800px) rotateX(0) rotateY(0)';
      });
    });
  }

  // Drop stale motion state before re-running on a route change — otherwise
  // the elements that just mounted get skipped because they never had
  // .anim-init / .anim-in to begin with, and anything returned to the tree
  // would stay stuck in whichever state it was last in.
  function resetReveals(root) {
    root.querySelectorAll('.anim-init, .anim-in').forEach(el => {
      el.classList.remove('anim-init', 'anim-in');
      el.style.transitionDelay = '';
    });
    root.querySelectorAll('.split-text.is-in').forEach(el => {
      // Re-trigger the split-text intro on route change
      el.classList.remove('is-in');
    });
  }

  let mutationObserver = null;
  function watchForLateNodes(root) {
    if (mutationObserver) return;
    mutationObserver = new MutationObserver((records) => {
      let hasNew = false;
      for (const rec of records) {
        for (const node of rec.addedNodes) {
          if (!(node instanceof HTMLElement)) continue;
          if (node.matches && (node.matches('[data-anim]') || node.querySelector('[data-anim]'))) {
            hasNew = true; break;
          }
        }
        if (hasNew) break;
      }
      if (hasNew) {
        markReveals(root);
        requestAnimationFrame(() => { setupReveals(root); setupSplitText(root); });
      }
    });
    mutationObserver.observe(root.body || root, { childList: true, subtree: true });
  }

  // Run — call after DOM is ready and React has painted
  window.__akelAnimations = {
    init(root) {
      root = root || document;
      setupCursor();
      setupScrollProgress();
      resetReveals(root);
      // Two rAFs: first frame paints the .anim-init hidden state, second
      // frame flips matching elements to .anim-in so the transition fires.
      requestAnimationFrame(() => {
        markReveals(root);
        requestAnimationFrame(() => {
          setupReveals(root);
          setupCountUps(root);
          setupMagnetic(root);
          setupSplitText(root);
          setupTilt(root);
        });
      });
      watchForLateNodes(root);
    },
    refresh(root) {
      root = root || document;
      resetReveals(root);
      requestAnimationFrame(() => {
        markReveals(root);
        requestAnimationFrame(() => {
          setupReveals(root);
          setupCountUps(root);
          setupMagnetic(root);
          setupSplitText(root);
          setupTilt(root);
        });
      });
    },
  };
})();
</script>

  const [sort, setSort] = React.useState('catalog');
  const [limit, setLimit] = React.useState(PAGE);
  const deferredQuery = React.useDeferredValue(query);
  React.useEffect(() => { setLimit(PAGE); }, [active, deferredQuery, sort]);
  // Keep chip state in sync with URL changes driven from outside (e.g. the
  // user clicks a category card on the homepage while we're already on the
  // products page — rare but covers popstate edge cases).
  React.useEffect(() => { setActive(initialCat || 'all'); }, [initialCat]);
  const setActiveAndURL = (k) => {
    setActive(k);
    if (onCatChange) onCatChange(k === 'all' ? null : k);
  };

  React.useEffect(() => {
    fetch('./data/products.json', { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(setData)
      .catch(e => setErr(e.message));
  }, []);

  const t = lang === 'tr'
    ? {
        title: 'Tüm ürünler',
        count: (n) => `${n} ürün`,
        empty: 'Henüz ürün eklenmedi.',

    : {

  const normalizedQuery = deferredQuery.trim().toLocaleLowerCase('tr-TR');
  const searched = shown.filter((p) => {
    if (!normalizedQuery) return true;
    const haystack = [
      p.sku,
      p.ad_tr,
      p.ad_en,
      p.aciklama_tr,
      p.aciklama_en,
      p.kategori,
    ].filter(Boolean).join(' ').toLocaleLowerCase('tr-TR');
    return haystack.includes(normalizedQuery);
  });

  // Group color/finish variants (402 beyaz + 402S siyah + 402K kırmızı) into a
  // single card. Keyed by category + SKU stripped of trailing variant letters
  // (S/K/D + KB/MB/TB doubled). Primary is beyaz → siyah → first.
  const VARIANT_RANK = { beyaz: 0, siyah: 1, desenli: 2, kirmizi: 3, 'kırmızı': 3, mavi: 4, yesil: 5, 'yeşil': 5 };
  function baseKey(p) {
    const s = String(p.sku || '').toUpperCase();
    const stripped = s.replace(/(KB|MB|TB)$/, '').replace(/[SKD]$/, '');
    return `${p.kategori}::${stripped}`;
  }
  const groupMap = new Map();
  for (const p of searched) {
    const k = baseKey(p);
    if (!groupMap.has(k)) groupMap.set(k, []);
    groupMap.get(k).push(p);
  }
  function sortMetric(p) {
    return sizeOf(p) || Number.MAX_SAFE_INTEGER;
  }
  const groups = [...groupMap.values()].map(g => {
    const sorted = g.slice().sort((a, b) => (VARIANT_RANK[a.renk] ?? 9) - (VARIANT_RANK[b.renk] ?? 9));
    return { primary: sorted[0], variants: sorted };
  }).sort((a, b) => {
    if (sort === 'sku') return String(a.primary.sku || '').localeCompare(String(b.primary.sku || ''), 'tr');
    if (sort === 'size-asc') return sortMetric(a.primary) - sortMetric(b.primary) || String(a.primary.sku || '').localeCompare(String(b.primary.sku || ''), 'tr');
    if (sort === 'size-desc') return sortMetric(b.primary) - sortMetric(a.primary) || String(a.primary.sku || '').localeCompare(String(b.primary.sku || ''), 'tr');
    return 0;
  });

  // Build a per-product spec line out of sized fields
  function buildSpec(p) {
    const parts = [];
    if (p.boyut) parts.push(p.boyut);
    else if (p.cap_mm) parts.push('Ø ' + (p.cap_mm / 10) + ' cm');
    else if (p.en_mm && p.boy_mm) parts.push((p.en_mm/10) + '×' + (p.boy_mm/10) + ' cm');
    if (p.agirlik_g) parts.push(p.agirlik_g + ' g');
    if (p.koli_adet) parts.push((lang === 'tr' ? 'Koli ' : 'Carton ') + p.koli_adet);
    return parts.join(' · ');
  }

  // Short size tag for the card title — 5 Kare Tabak rows in a row all share
  // the same photo, so the size in the name is what lets a buyer tell them
  // apart at a glance. Ø 25 cm / 29 cm / 35×24 cm, etc.
  function sizeTag(p) {
    if (p.cap_mm) return 'Ø ' + (p.cap_mm / 10) + ' cm';
    const en = p.en_mm, boy = p.boy_mm;
    if (en && boy) {
      if (en === boy) return (en / 10) + ' cm';
      return (en / 10) + '×' + (boy / 10) + ' cm';
    }
    return null;
  }

  function catLabel(k) {
    const c = data.categories.find(x => x.key === k);
    return c ? c[lang] : k;
  }

  return (
    <section className="section" data-anim="section">
      <div className="section__head">
        <div>
          <span className="eyebrow" data-anim="fade-up">{lang === 'tr' ? 'Katalog' : 'Catalog'}</span>
          <h2 className="section__title"><span data-split-text>{t.title}</span></h2>
        </div>
        <span className="meta">{t.count(groups.length)}</span>
      </div>

      <div className="products-toolbar" data-anim="fade-up">
        <label className="products-toolbar__field">
          <span className="field__lbl">{t.searchLabel}</span>
          <input
            className="input products-toolbar__input"
            type="search"
            placeholder={t.searchPlaceholder}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
        </label>
        <label className="products-toolbar__field">
          <span className="field__lbl">{t.sortLabel}</span>
          <select
            className="select products-toolbar__select"
            value={sort}
            onChange={(e) => setSort(e.target.value)}
          >
            {t.sortOptions.map((opt) => (
              <option key={opt.k} value={opt.k}>{opt.l}</option>
            ))}
          </select>
        </label>
        <div className="products-toolbar__meta">
          <span className="meta">{t.meta(deferredQuery.trim(), groups.length)}</span>
        </div>
      </div>

      <div className="filter-row" data-anim="fade-up">
        {filters.map(f => (
          <button type="button"
            key={f.k}
            className={`chip ${active === f.k ? 'is-on' : ''}`}
            onClick={() => setActiveAndURL(f.k)}
          >{f.l}</button>
        ))}
      </div>

      <ProductCareInfo lang={lang} variant="compact" />

      {groups.length === 0 ? (
        <p className="lead" style={{padding: '48px 0'}}>{normalizedQuery ? t.emptySearch : t.empty}</p>
      ) : (
        <div className="product-grid" data-anim-stagger>
          {groups.slice(0, limit).map(({ primary: p, variants }, i) => {
            const spec = buildSpec(p);
            const baseName = lang === 'tr' ? p.ad_tr : (p.ad_en || p.ad_tr);
            const sz = sizeTag(p);
            const name = sz ? `${baseName} · ${sz}` : baseName;
            const dotFor = (v) => v.renk === 'siyah' ? 'black' : v.renk === 'beyaz' ? 'white' : 'custom';
            const cardPhotoBase = p.sade_foto_dosya_adi || p.foto_dosya_adi;
            return (
              <div
                key={p.foto_dosya_adi || p.sku}
                className="product-card tilt"
                data-anim="stagger-item"
                onClick={() => openProduct(p)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openProduct(p);
                  }
                }}
                role="button"
                tabIndex="0"
              >
                <div className={`product-card__ph product-card__ph--${i % 4}`} aria-hidden="true">
                  {cardPhotoBase && (
                    <img
                      className="product-card__photo"
                      src={`./img/${cardPhotoBase}.webp`}
                      alt={name}
                      loading={i < 6 ? 'eager' : 'lazy'}
                      fetchpriority={i < 3 ? 'high' : 'auto'}
                      decoding="async"
                      width="600"
                      height="450"
                      onLoad={(e) => e.target.closest('.product-card__ph').classList.add('is-photo-loaded')}
                      onError={(e) => {
                        if (!e.target.__triedPng) {
                          e.target.__triedPng = true;
                          e.target.src = `./img/${cardPhotoBase}.png`;
                        } else { e.target.style.display = 'none'; }
                      }}
                    />
                  )}
                  <div className="product-card__placeholder">
                    <span className="product-card__placeholder-sku">{p.sku}</span>
                    <span className="product-card__placeholder-note">{lang === 'tr' ? 'Görsel yakında' : 'Photo soon'}</span>
                  </div>
                  {p.etiket && <span className="product-card__badge">{p.etiket}</span>}
                  {p.sku && <span className="product-card__code">#{p.sku}</span>}
                </div>
                <div className="product-card__body">
                  <div className="product-card__meta">
                    <span className="product-card__eyebrow">{catLabel(p.kategori)}</span>
                    {variants.length > 0 && (
                      <div className="product-card__variants" aria-hidden="true">
                        {variants.map(v => (
                          <span
                            key={v.sku}
                            className={`variant-dot variant-dot--${dotFor(v)}`}
                            style={v.renk !== 'beyaz' && v.renk !== 'siyah' ? {background: 'var(--red)'} : undefined}
                          />
                        ))}
                      </div>
                    )}
                  </div>
                  <span className="product-card__name">{name}</span>
                  {spec && <span className="product-card__spec">{spec}</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {groups.length > limit && (
        <div className="product-grid__more">
          <button type="button" className="btn btn--ghost" onClick={() => setLimit(l => l + PAGE)}>
            {t.loadMore} ({groups.length - limit})
          </button>
        </div>
      )}
    </section>
  );
}

        ctaBody: (sku) => `We can share pricing, sample details and carton information for ${sku ? 'SKU ' + sku : 'this product'}. We can also align on nearby sizes and custom-logo suitability if needed.`,

        ctaSecondary: 'Catalog PDF',
        callNow: 'Call now',
        showroom: 'Showroom',
        carton: 'Carton pack',

        onRequest: 'On request',
        matList: ['Made from melamine', 'ISO 9001:2015 quality management', 'ISO 22000:2018 food safety', 'Intertek-tested', 'FQC quality control'],

  // Build spec rows from structured fields
  function dim() {

    if (product.en_mm) parts.push(product.en_mm / 10);
    if (product.boy_mm) parts.push(product.boy_mm / 10);
    if (product.yukseklik_mm) parts.push(product.yukseklik_mm / 10);
    if (parts.length) return parts.join(' × ') + ' cm';
    return product.boyut || null;
  }

  const colorLabel = product.renk
    ? (lang === 'tr'
        ? { beyaz: 'Beyaz', siyah: 'Siyah', desenli: 'Desenli', kirmizi: 'Kırmızı', mavi: 'Mavi', yesil: 'Yeşil' }[product.renk] || product.renk
        : { beyaz: 'White', siyah: 'Black', desenli: 'Patterned', kirmizi: 'Red', mavi: 'Blue', yesil: 'Green' }[product.renk] || product.renk)
    : null;

  const rows = [];
  const dimVal = dim();
  if (dimVal) rows.push([lang === 'tr' ? 'Boyutlar' : 'Dimensions', dimVal]);
  if (product.agirlik_g) rows.push([lang === 'tr' ? 'Ağırlık' : 'Weight', product.agirlik_g + ' g']);
  if (product.sku) rows.push(['SKU', product.sku]);
  if (colorLabel) rows.push([t.color, colorLabel]);
  if (product.barkod) rows.push([lang === 'tr' ? 'Barkod' : 'Barcode', String(product.barkod).replace(/\s+/g, '')]);

  const pack = [];
  if (product.koli_adet) pack.push([lang === 'tr' ? 'Kolide adet' : 'Pieces per carton', product.koli_adet]);
  if (product.koli_cm)   pack.push([lang === 'tr' ? 'Koli boyutu' : 'Carton dimensions', product.koli_cm]);
  if (product.koli_agirlik_kg) pack.push([lang === 'tr' ? 'Koli brüt' : 'Carton gross', product.koli_agirlik_kg + ' kg']);
  if (product.ozel_logolu_uygun) pack.push([t.logo, product.ozel_logolu_uygun === 'evet' ? t.yes : t.no]);
  if (product.kullanim_alani) pack.push([t.useArea, product.kullanim_alani]);

  const photoSrc = product.foto_dosya_adi ? `./img/${product.foto_dosya_adi}.webp` : null;
  const plainSrc = product.sade_foto_dosya_adi ? `./img/${product.sade_foto_dosya_adi}.webp` : null;
  const productName = lang === 'tr' ? product.ad_tr : (product.ad_en || product.ad_tr);
  const productDesc = (lang === 'tr' ? product.aciklama_tr : product.aciklama_en) || '';
  const compactUse = (product.kullanim_alani || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean)
    .slice(0, 3)
    .join(' · ');
  const summary = [
    { k: 'SKU', v: product.sku || '—' },
    { k: t.carton, v: product.koli_adet ? `${product.koli_adet} ${t.pieces}` : t.onRequest },
    { k: t.useArea, v: compactUse || (lang === 'tr' ? 'Profesyonel servis' : 'Professional service') },
  ];
  const mailHref = `mailto:info@akelmelamin.com?subject=${encodeURIComponent(`Akel Melamin · ${productName}${product.sku ? ` (${product.sku})` : ''}`)}`;

  // Gallery: selected imaj shot and original plain product shot.
  const gallery = [
    { src: photoSrc, kind: 'imaj', caption: t.images },
    ...(plainSrc ? [{ src: plainSrc, kind: 'plain', caption: t.plainImage }] : []),
  ].filter(g => g.src);
  const [galleryIdx, setGalleryIdx] = React.useState(0);
  React.useEffect(() => { setGalleryIdx(0); }, [product.sku]);
  const activeImage = gallery[galleryIdx] || gallery[0];
  const activeIsImaj = activeImage?.kind === 'imaj';
  const [frameAspect, setFrameAspect] = React.useState(null);
  React.useEffect(() => { setFrameAspect(null); }, [activeImage?.src]);
  const fallbackAspect = activeIsImaj ? '3 / 2' : '1 / 1';
  const galleryLabel = (kind) => {
    if (kind === 'imaj') return t.images;
    return t.plainImage;
  };

  return (
    <section className="section" data-anim="section">

      <div className="pd">
        <div className="pd__gallery" data-anim="fade-up">
          <div
            className={`pd__hero pd__hero--${activeImage?.kind || 'product'}`}
            style={{'--pd-frame-aspect': frameAspect || fallbackAspect}}
            aria-hidden="true"
            onTouchStart={(e) => { e.currentTarget.__tx = e.touches[0].clientX; }}
            onTouchEnd={(e) => {
              const x0 = e.currentTarget.__tx, x1 = e.changedTouches[0].clientX;
              if (x0 == null || gallery.length < 2) return;
              const dx = x1 - x0;
              if (Math.abs(dx) < 40) return;
              setGalleryIdx(i => (i + (dx < 0 ? 1 : gallery.length - 1)) % gallery.length);
            }}
          >
            {activeImage && (

                className={`pd__photo ${activeIsImaj ? 'pd__photo--imaj' : ''}`}

                height={activeIsImaj ? '1000' : '800'}
                decoding="async"
                onLoad={(e) => {
                  const img = e.currentTarget;
                  if (img.naturalWidth && img.naturalHeight) {
                    setFrameAspect(`${img.naturalWidth} / ${img.naturalHeight}`);
                  }
                  img.closest('.pd__hero').classList.add('is-photo-loaded');
                }}
                onError={(e) => {
                  if (activeImage.kind === 'imaj' && product.foto_dosya_adi && !e.target.__triedPng) {
                    e.target.__triedPng = true;
                    e.target.src = `./img/${product.foto_dosya_adi}.png`;
                  } else {
                    e.target.style.display = 'none';
                  }
                }}
              />
            )}
            <div className="pd__placeholder">
              <span className="pd__placeholder-sku">{product.sku}</span>
              <span className="pd__placeholder-note">{lang === 'tr' ? 'Görsel yakında' : 'Photo soon'}</span>
            </div>
            <span className="pd__caption meta">{activeImage?.caption || t.images}</span>
            {gallery.length > 1 && (
              <div className="pd__nav" role="tablist" aria-label={lang === 'tr' ? 'Görsel galerisi' : 'Image gallery'}>
                {gallery.map((g, i) => (
                  <button
                    key={i} type="button" role="tab"
                    aria-selected={i === galleryIdx}
                    aria-label={galleryLabel(g.kind)}
                    className={i === galleryIdx ? 'is-on' : ''}
                    onClick={() => setGalleryIdx(i)}
                  />
                ))}
              </div>
            )}
          </div>
          {gallery.length > 1 && (
            <div className="pd__thumbs pd__thumbs--gallery">
              {gallery.map((g, i) => (
                <button
                  key={i} type="button"
                  className={`pd__thumb pd__thumb--photo ${i === galleryIdx ? 'is-on' : ''}`}
                  onClick={() => setGalleryIdx(i)}
                  aria-label={galleryLabel(g.kind)}
                >
                  <img src={g.src} alt="" loading="lazy" decoding="async"
                       onError={(e) => { e.target.closest('button').style.display = 'none'; }} />

          )}
          <div className="pd__summary">
            {summary.map((item) => (
              <div key={item.k} className="pd__summary-item">
                <span className="meta">{item.k}</span>
                <strong>{item.v}</strong>
              </div>
            ))}
          </div>
        </div>

        <div className="pd__info" data-anim="fade-up" data-anim-delay="80">
          <span className="eyebrow">{(product.kategori || '').toUpperCase()}</span>
          <h1 className="pd__title"><span data-split-text>{productName}</span></h1>
          {productDesc && (
            <p className="pd__spec lead">{productDesc}</p>
          )}

          <div className="pd__cta-card">
            <span className="meta">{t.ctaEyebrow}</span>
            <h2 className="pd__cta-title">{t.ctaTitle}</h2>
            <p className="pd__cta-body">{t.ctaBody(product.sku)}</p>
            <div className="pd__cta-actions">
              <button type="button" className="btn btn--primary magnetic" onClick={() => navigate('contact')}>
                {t.ctaPrimary}
              </button>
              <button type="button" className="btn btn--ghost" onClick={() => navigate('catalog')}>
                {t.ctaSecondary}
              </button>
            </div>
            <div className="pd__cta-direct">
              <a className="pd__cta-link" href="tel:+905074253446"><i data-lucide="phone"></i> {t.callNow}: +90 507 425 34 46</a>
              <a className="pd__cta-link" href={mailHref}><i data-lucide="mail"></i> info@akelmelamin.com</a>
              <a className="pd__cta-link" href="https://maps.google.com/?q=İSTOÇ+10.Ada+No:9/11+Bağcılar+İstanbul" target="_blank" rel="noopener"><i data-lucide="map-pin"></i> {t.showroom}: İSTOÇ 10. Ada No:9/11</a>
            </div>
          </div>

          <SpecBlock title={t.specs} rows={rows} />
          <SpecBlock title={t.pack} rows={pack} />
          <ProductCareInfo lang={lang} variant="detail" />
          <div className="pd__mat">
            <span className="meta">{t.materials}</span>
            <ul className="pd__matlist">
              {t.matList.map((m, i) => (
                <li key={i}><i data-lucide="check"></i> {m}</li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
}

function SpecBlock({ title, rows }) {
  if (!rows || !rows.length) return null;
  return (
    <div className="spec-block">
      <span className="meta">{title}</span>
      <table className="spec-table">
        <tbody>
          {rows.map(([k, v], i) => (
            <tr key={i}><td className="k">{k}</td><td className="v">{v}</td></tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Opt-in PDF viewer — user clicks "Önizle" to load the iframe. Keeps initial
// page light (no 6MB fetch on catalog route entry).
/* ====== CatalogFlipbook.jsx ====== */
// pdf.js renders each catalog page to a canvas; StPageFlip (page-flip lib)
// wraps the canvases into a real book with turn animation, drag-to-flip
// and keyboard shortcuts. Libraries are loaded on demand — the bundle
// for the rest of the site stays lean, and only users who land on
// /katalog pay the ~250 KB JS cost.
const CATALOG_LIBS = {
  pdfjs:    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
  pdfWorker:'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js',
  pageFlip: 'https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js',
};

function loadScriptOnce(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const el = document.createElement('script');
    el.src = src; el.async = true;
    el.onload = () => resolve();
    el.onerror = () => reject(new Error('Script load failed: ' + src));
    document.head.appendChild(el);
  });
}

function CatalogFlipbook({ lang, pdfUrl }) {
  const containerRef = React.useRef(null);
  const flipRef = React.useRef(null);
  const [status, setStatus] = React.useState('loading'); // 'loading' | 'ready' | 'error'
  const [progress, setProgress] = React.useState({ done: 0, total: 0 });
  const [page, setPage] = React.useState(1);
  const [totalPages, setTotalPages] = React.useState(0);
  const t = lang === 'tr'
    ? { title: 'Katalog önizlemesi', hint: 'Sayfaları çevirerek tamamını incele.',
        loading: 'Katalog hazırlanıyor', prev: 'Önceki', next: 'Sonraki',
        error: 'Önizleme yüklenemedi — katalogu doğrudan indirebilirsin.',
        download: 'İndir', openTab: 'Yeni sekmede aç', page: 'Sayfa' }
    : { title: 'Catalog preview', hint: 'Flip through the pages.',
        loading: 'Preparing catalog', prev: 'Prev', next: 'Next',
        error: 'Preview failed to load — you can download the catalog directly.',
        download: 'Download', openTab: 'Open in new tab', page: 'Page' };

  const flipPrev = React.useCallback(() => {
    if (!flipRef.current) return;
    flipRef.current.flipPrev();
  }, []);

  const flipNext = React.useCallback(() => {
    if (!flipRef.current) return;
    flipRef.current.flipNext();
  }, []);

  React.useEffect(() => {
    let cancelled = false;
    async function init() {
      try {
        await Promise.all([
          loadScriptOnce(CATALOG_LIBS.pdfjs),
          loadScriptOnce(CATALOG_LIBS.pageFlip),
        ]);
        if (cancelled) return;
        const pdfjsLib = window.pdfjsLib;
        const PageFlipCtor = (window.St && window.St.PageFlip) || window.PageFlip;
        if (!pdfjsLib || !PageFlipCtor) throw new Error('libs missing');
        pdfjsLib.GlobalWorkerOptions.workerSrc = CATALOG_LIBS.pdfWorker;

        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
        if (cancelled) return;
        const num = pdf.numPages;
        setTotalPages(num);
        setProgress({ done: 0, total: num });

        const container = containerRef.current;
        if (!container) return;
        container.innerHTML = '';

        // Target render resolution scaled by DPR, capped for memory.
        const first = await pdf.getPage(1);
        const v1 = first.getViewport({ scale: 1 });
        const targetW = Math.min(900, v1.width * 1.25);
        const scale = targetW / v1.width;

        for (let i = 1; i <= num; i++) {
          if (cancelled) return;
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width  = viewport.width;
          canvas.height = viewport.height;
          canvas.style.width = '100%';
          canvas.style.height = 'auto';
          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
          const wrap = document.createElement('div');
          wrap.className = 'flipbook__page';
          wrap.appendChild(canvas);
          container.appendChild(wrap);
          setProgress({ done: i, total: num });
        }
        if (cancelled) return;

        const firstCanvas = container.querySelector('canvas');
        const book = new PageFlipCtor(container, {
          width: firstCanvas.width,
          height: firstCanvas.height,
          size: 'stretch',
          minWidth: 280,
          maxWidth: 1200,
          minHeight: 360,
          maxHeight: 1700,
          showCover: true,
          flippingTime: 650,
          usePortrait: true,
          maxShadowOpacity: 0.35,
          mobileScrollSupport: true,
        });
        book.loadFromHTML(container.querySelectorAll('.flipbook__page'));
        flipRef.current = book;
        book.on('flip', (e) => setPage(Number(e.data) + 1));
        setStatus('ready');
      } catch (err) {
        if (!cancelled) { console.error('[flipbook]', err); setStatus('error'); }
      }
    }
    init();
    return () => {
      cancelled = true;
      try { flipRef.current && flipRef.current.destroy && flipRef.current.destroy(); } catch (_) {}
    };
  }, [pdfUrl]);

  // Keyboard shortcuts: ←/→ arrows flip pages while the flipbook is in view
  React.useEffect(() => {
    if (status !== 'ready') return;
    const onKey = (e) => {
      if (e.key === 'ArrowLeft') flipPrev();
      else if (e.key === 'ArrowRight') flipNext();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [status, flipPrev, flipNext]);

  return (
    <div className="flipbook" data-anim="fade-up">
      <div className="flipbook__head">
        <div>
          <span className="eyebrow">{t.title}</span>
          <span className="flipbook__hint">{t.hint}</span>
        </div>
        <div className="flipbook__actions">
          <a className="btn btn--ghost btn--sm" href={pdfUrl} target="_blank" rel="noopener">
            {t.openTab} ↗
          </a>
          <a className="btn btn--ghost btn--sm" href={pdfUrl} download="Akel-Melamin-Katalog-2026.pdf">
            {t.download} ↓
          </a>
        </div>
      </div>

      <div className="flipbook__stage">
        <div ref={containerRef} className="flipbook__container" aria-hidden={status !== 'ready'}></div>
        {status === 'loading' && (
          <div className="flipbook__status">
            <span className="flipbook__spinner" aria-hidden="true"></span>
            <span>{t.loading}{progress.total ? ` · ${progress.done}/${progress.total}` : '…'}</span>
          </div>
        )}
        {status === 'error' && (
          <div className="flipbook__status flipbook__status--error">
            <span>{t.error}</span>
            <a className="btn btn--primary btn--sm" href={pdfUrl} download>{t.download} ↓</a>
          </div>
        )}
      </div>

      {status === 'ready' && (
        <div className="flipbook__controls">
          <button type="button" className="flipbook__btn" aria-label={t.prev}
            onClick={flipPrev}>‹</button>
          <span className="flipbook__pos">
            {t.page} <strong>{page}</strong> / {totalPages}
          </span>
          <button type="button" className="flipbook__btn" aria-label={t.next}
            onClick={flipNext}>›</button>
        </div>
      )}
    </div>
  );
}

window.CatalogFlipbook = CatalogFlipbook;
window.CatalogPage = CatalogPage;

          <img src="./img/akel-logo-cropped.png" alt="Akel Melamin" width="160" height="79" decoding="async" />
          <p className="site-footer__tag">{t.tag}</p>
          <div className="site-footer__social">
            <a href="https://instagram.com/akelmelamin" target="_blank" rel="noopener" aria-label="Instagram @akelmelamin">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg> @akelmelamin
            </a>
            <a href="https://akelmelamin.com" target="_blank" rel="noopener" aria-label="akelmelamin.com">
              <i data-lucide="globe"></i> akelmelamin.com
            </a>
          </div>
        </div>
        {t.cols.map((c, i) => (
          <div className="site-footer__col" key={i}>
            <span className="meta">{c.h}</span>
            <ul>
              {c.links.map((link) => {
                const [label, pathOrHref, kind] = link;
                const isExternal = kind === 'external';
                return (
                  <li key={label}>
                    {isExternal ? (
                      <a
                        href={pathOrHref}
                        target={pathOrHref.startsWith('http') ? '_blank' : undefined}
                        rel={pathOrHref.startsWith('http') ? 'noopener' : undefined}
                      >{label}</a>
                    ) : (
                      <a
                        href={pathToURL(pathOrHref)}
                        onClick={(e) => { e.preventDefault(); navigate(pathOrHref); }}
                      >{label}</a>
                    )}
                  </li>
                );
              })}
            </ul>
          </div>
        ))}
      </div>

        <span className="meta">{t.legal}</span>

          <span className="cert-chip cert-chip--sm">FQC</span>
          <span className="cert-chip cert-chip--sm">Yerli Üretim</span>

    </footer>
  );
}

window.Footer = Footer;


/* ====== App.jsx ====== */
// URL routing: real paths via history.pushState.
//   /                → home
//   /urunler         → products
//   /urunler/<slug>  → product detail (slug = foto_dosya_adi or lowercased SKU)
//   /referanslar     → references
//   /hakkimizda      → about
//   /iletisim        → contact
//   /katalog         → catalog
// BASE auto-detects when served from the dev subfolder (/ui_kits/website)
// so browser back/forward and copy-pasted URLs work there too. CF Workers
// Static Assets (wrangler.toml: not_found_handling = "single-page-application")
// rewrites unknown routes back to index.html so deep links load.
const ROUTES = {
  home:     '/',
  products: '/urunler',
  references: '/referanslar',
  about:    '/hakkimizda',
  contact:  '/iletisim',
  catalog:  '/katalog',
};
const URL_TO_PATH = { '/': 'home', '/urunler': 'products', '/referanslar': 'references', '/hakkimizda': 'about', '/iletisim': 'contact', '/katalog': 'catalog' };
const BASE = (() => {
  // Dev server serves from /ui_kits/website/; strip that prefix.
  const p = window.location.pathname;
  const devPrefix = '/ui_kits/website';
  if (p === devPrefix || p.startsWith(devPrefix + '/')) return devPrefix;
  return '';
})();
function parseURL() {
  let p = window.location.pathname;
  if (BASE && p.startsWith(BASE)) p = p.slice(BASE.length) || '/';
  p = p.replace(/\/+$/, '') || '/';
  const qs = new URLSearchParams(window.location.search);
  const cat = qs.get('cat') || null;
  if (p.startsWith('/urunler/')) return { path: 'product', slug: decodeURIComponent(p.slice('/urunler/'.length)) };
  const base = { path: URL_TO_PATH[p] || 'home' };
  if (base.path === 'products' && cat) base.cat = cat;
  return base;
}
function pathToURL(path, opts) {
  if (path === 'product' && typeof opts === 'string') return BASE + '/urunler/' + opts;
  if (path === 'products' && opts && typeof opts === 'object' && opts.cat) return BASE + '/urunler?cat=' + encodeURIComponent(opts.cat);
  return BASE + (ROUTES[path] || '/');
}
function productSlug(p) { return p.foto_dosya_adi || String(p.sku).toLowerCase(); }

function App() {
  const [lang, setLang] = React.useState(() => localStorage.getItem('akel-lang') || 'tr');
  const initial = React.useMemo(parseURL, []);
  const [path, setPath] = React.useState(initial.path);
  const [product, setProduct] = React.useState(null);
  const [pendingSlug, setPendingSlug] = React.useState(initial.slug || null);
  const [catHint, setCatHint] = React.useState(initial.cat || null);

  React.useEffect(() => { localStorage.setItem('akel-lang', lang); document.documentElement.lang = lang; }, [lang]);

  // Resolve a product slug (deep link like /urunler/kare-517) by fetching the catalog once.
  React.useEffect(() => {
    if (path === 'product' && pendingSlug && !product) {
      fetch('./data/products.json').then(r => r.json()).then(d => {
        const hit = d.products.find(p => productSlug(p) === pendingSlug);
        if (hit) { setProduct(hit); setPendingSlug(null); }
        else { setPath('products'); setPendingSlug(null); history.replaceState(null, '', BASE + ROUTES.products); }
      }).catch(() => { setPath('home'); setPendingSlug(null); });
    }
  }, [path, pendingSlug, product]);

  // Browser back/forward
  React.useEffect(() => {
    const onPop = () => {
      const s = parseURL();
      setPath(s.path);
      setCatHint(s.cat || null);
      if (s.slug) { setPendingSlug(s.slug); setProduct(null); }
      else { setPendingSlug(null); setProduct(null); }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const scrollTop = () => requestAnimationFrame(() => window.scrollTo({ top: 0, left: 0, behavior: 'auto' }));
  const pushURL = (url) => { if (window.location.pathname + window.location.search !== url) history.pushState(null, '', url); };
  const navigate = (p, opts) => {
    setPath(p); setProduct(null); setPendingSlug(null);
    const cat = (p === 'products' && opts && typeof opts === 'object') ? (opts.cat || null) : null;
    setCatHint(cat);
    pushURL(pathToURL(p, cat ? { cat } : undefined));
    scrollTop();
  };
  const openProduct = (p) => {
    setProduct(p); setPath('product'); setPendingSlug(null);
    pushURL(pathToURL('product', productSlug(p)));
    scrollTop();
  };
  // Lets ProductGrid update the URL when user clicks a filter chip, without
  // going through a full navigate() that would reset state.
  const replaceCat = (cat) => {
    setCatHint(cat);
    const url = pathToURL('products', cat ? { cat } : undefined);
    if (window.location.pathname + window.location.search !== url) history.replaceState(null, '', url);
  };

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
    if (window.__akelAnimations) window.__akelAnimations.init(document);
  }, [path, lang, product]);
  return (
    <div className="kit-scroll" data-screen-label={`Akel · ${path}`}>
      <a href="#main" className="skip-link" onClick={(e) => { e.preventDefault(); const m = document.getElementById('main'); if (m) m.focus(); }}>
        {lang === 'tr' ? 'İçeriğe geç' : 'Skip to content'}
      </a>
      <Header lang={lang} setLang={setLang} currentPath={path} navigate={navigate} />
      <main id="main" tabIndex="-1" key={path} className="page-fade">
      {path === 'home' && <>
        <Hero lang={lang} navigate={navigate} />
        <StatsRow lang={lang} />
        <Categories lang={lang} navigate={navigate} />
        <ReferencesPreview lang={lang} navigate={navigate} />
        <EditorialSpread lang={lang} />
        <CatalogBand lang={lang} navigate={navigate} />
      </>}
      {path === 'products' && <ProductGrid lang={lang} navigate={navigate} openProduct={openProduct} initialCat={catHint} onCatChange={replaceCat} />}
      {path === 'product' && product && <ProductDetail lang={lang} product={product} onBack={() => navigate('products')} navigate={navigate} />}
      {path === 'product' && !product && <section className="section"><p className="lead">{lang === 'tr' ? 'Yükleniyor…' : 'Loading…'}</p></section>}
      {path === 'references' && <ReferencesPage lang={lang} />}
      {path === 'about' && <About lang={lang} navigate={navigate} />}
      {path === 'contact' && <Contact lang={lang} />}
      {path === 'catalog' && <CatalogPage lang={lang} navigate={navigate} />}
      </main>
      <Footer lang={lang} navigate={navigate} />
      <ScrollToTop lang={lang} />
    </div>
  );
}

function ScrollToTop({ lang }) {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 800);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const up = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  return (
    <button
      type="button"
      className={`scroll-top ${show ? 'is-on' : ''}`}
      aria-label={lang === 'tr' ? 'Yukarı çık' : 'Back to top'}
      onClick={up}
    >
      <i data-lucide="arrow-up"></i>
    </button>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
