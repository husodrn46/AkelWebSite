<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chips & badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.02em; border: 1px solid var(--border-strong); background: var(--paper-soft); color: var(--graphite); cursor: pointer; }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .badge { display: inline-flex; padding: 4px 8px; border-radius: 2px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .b-red { background: var(--terracotta); color: #fff; }
  .b-ink { background: var(--ink); color: var(--paper); }
  .b-bone { background: var(--bone); color: var(--graphite); }
  .b-out { border: 1px solid var(--graphite); color: var(--graphite); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; width: 64px; }
</style></head>
<body>
  <div class="row"><span class="lbl">filter chips</span>
    <span class="chip on">All</span><span class="chip">Dinner sets</span><span class="chip">Tepsiler</span><span class="chip">Kaseler</span><span class="chip">Çocuk</span>
  </div>
  <div class="row"><span class="lbl">badges</span>
    <span class="badge b-red">New</span><span class="badge b-ink">Export</span><span class="badge b-bone">[CERT]</span><span class="badge b-out">[CERT] approved</span>
  </div>
</body></html>
