<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { padding: 32px 24px; margin: 0; background: var(--paper); display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; } .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; } .card { width: 110px; height: 70px; background: var(--paper-soft); border-radius: 4px; } .k { font-family: var(--font-mono); font-size: 11px; } .v { font-family: var(--font-mono); font-size: 10px; color: var(--slate); }</style></head>
<body>
  <div class="cell"><div class="card" style="box-shadow:var(--shadow-1)"></div><span class="k">shadow-1</span><span class="v">static lift</span></div>
  <div class="cell"><div class="card" style="box-shadow:var(--shadow-2)"></div><span class="k">shadow-2</span><span class="v">cards</span></div>
  <div class="cell"><div class="card" style="box-shadow:var(--shadow-3)"></div><span class="k">shadow-3</span><span class="v">hover · menus</span></div>
  <div class="cell"><div class="card" style="box-shadow:var(--shadow-4)"></div><span class="k">shadow-4</span><span class="v">modals</span></div>
</body></html>
