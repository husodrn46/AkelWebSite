<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; margin: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 20px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 4px; font-family: var(--font-display); font-weight: 600; font-size: 14px; letter-spacing: 0.01em; cursor: pointer; border: 1px solid transparent; transition: background var(--dur-med) var(--ease-out), color var(--dur-med) var(--ease-out), border-color var(--dur-med) var(--ease-out); }
  .btn.primary { background: var(--akel-red); color: #fff; }
  .btn.primary:hover { background: var(--akel-red-dark); }
  .btn.secondary { background: var(--ink); color: var(--paper); }
  .btn.secondary:hover { background: var(--graphite); }
  .btn.ghost { background: transparent; color: var(--graphite); border-color: var(--border-strong); }
  .btn.ghost:hover { background: var(--bone); }
  .btn.link { background: transparent; color: var(--graphite); padding: 6px 0; border: 0; border-bottom: 1px solid var(--graphite); border-radius: 0; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; }
</style></head>
<body>
  <span class="lbl">primary</span><div><button class="btn primary">Kataloğu indir <span>→</span></button></div>
  <span class="lbl">secondary</span><div><button class="btn secondary">Request samples</button></div>
  <span class="lbl">ghost</span><div><button class="btn ghost">Filtreler</button></div>
  <span class="lbl">link</span><div><button class="btn link">About the factory →</button></div>
</body></html>
