<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { padding: 24px; margin: 0; } .stack > * + * { margin-top: 14px; } .label { font-family: var(--font-mono); font-size: 10px; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; }</style></head>
<body>
  <div class="stack">
    <div>
      <div class="label">display-xl · Space Grotesk 700 · −0.03em</div>
      <div class="display-xl" style="font-size:64px;line-height:.98">Sofra için üretim.</div>
    </div>
    <div>
      <div class="label">display · Space Grotesk 700</div>
      <div class="display" style="font-size:40px">Her boyutta, her masada.</div>
    </div>
  </div>
</body></html>
