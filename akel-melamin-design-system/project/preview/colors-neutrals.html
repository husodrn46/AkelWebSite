<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; margin: 0; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { border-radius: 4px; padding: 10px; min-height: 108px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--mist); }
  .sw .name { font-family: var(--font-display); font-weight: 700; font-size: 11px; letter-spacing: -0.005em; }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.02em; text-transform: uppercase; opacity: 0.75; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--paper);color:var(--graphite)"><span class="name">paper</span><span class="hex">#F7F6F3</span></div>
    <div class="sw" style="background:var(--paper-soft);color:var(--graphite)"><span class="name">paper-soft</span><span class="hex">#FBFAF7</span></div>
    <div class="sw" style="background:var(--bone);color:var(--graphite)"><span class="name">bone</span><span class="hex">#EEECE6</span></div>
    <div class="sw" style="background:var(--mist);color:var(--graphite)"><span class="name">mist</span><span class="hex">#E4E2DB</span></div>
    <div class="sw" style="background:var(--stone);color:#fff"><span class="name">stone</span><span class="hex">#B8B5AC</span></div>
    <div class="sw" style="background:var(--slate);color:#fff"><span class="name">slate</span><span class="hex">#6E6B63</span></div>
    <div class="sw" style="background:var(--graphite);color:#fff"><span class="name">graphite</span><span class="hex">#2A2A28</span></div>
    <div class="sw" style="background:var(--ink);color:#fff"><span class="name">ink</span><span class="hex">#111110</span></div>
  </div>
</body></html>
