<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { padding: 24px; margin: 0; } .row { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--border); } .row:last-child { border: 0; } .tag { font-family: var(--font-mono); font-size: 10px; color: var(--slate); letter-spacing: 0.04em; text-transform: uppercase; }</style></head>
<body>
  <div class="row"><span class="tag">h1 · 800</span><h1 style="font-size:32px">Kurumsal üretim kalitesi</h1></div>
  <div class="row"><span class="tag">h2 · 700</span><h2 style="font-size:24px">Fabrika ve kapasite</h2></div>
  <div class="row"><span class="tag">h3 · 600</span><h3>Günlük üretim hatları</h3></div>
  <div class="row"><span class="tag">eyebrow</span><span class="eyebrow">İhracat · export</span></div>
  <div class="row"><span class="tag">meta</span><span class="meta">SKU · YT-0432</span></div>
</body></html>
