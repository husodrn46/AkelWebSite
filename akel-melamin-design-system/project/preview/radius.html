<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { padding: 24px; margin: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; } .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; } .box { width: 76px; height: 76px; background: var(--graphite); } .k { font-family: var(--font-mono); font-size: 11px; } .v { font-family: var(--font-mono); font-size: 10px; color: var(--slate); }</style></head>
<body>
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="k">radius-sm</span><span class="v">2px · inputs</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><span class="k">radius-md</span><span class="v">4px · buttons</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="k">radius-lg</span><span class="v">8px · modals</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-pill);width:120px"></div><span class="k">radius-pill</span><span class="v">999 · chips</span></div>
</body></html>
