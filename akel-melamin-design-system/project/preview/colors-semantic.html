<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; font-family: var(--font-body); }
  .list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--paper-soft); }
  .chip { width: 22px; height: 22px; border-radius: 3px; border: 1px solid rgba(0,0,0,.06); flex: 0 0 auto; }
  .k { font-family: var(--font-display); font-weight: 600; font-size: 12px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--slate); margin-left: auto; }
</style></head>
<body>
  <div class="list">
    <div class="row"><div class="chip" style="background:var(--fg)"></div><span class="k">fg</span><span class="v">graphite</span></div>
    <div class="row"><div class="chip" style="background:var(--fg-muted)"></div><span class="k">fg-muted</span><span class="v">slate</span></div>
    <div class="row"><div class="chip" style="background:var(--fg-subtle)"></div><span class="k">fg-subtle</span><span class="v">stone</span></div>
    <div class="row"><div class="chip" style="background:var(--fg-accent)"></div><span class="k">fg-accent</span><span class="v">terracotta</span></div>
    <div class="row"><div class="chip" style="background:var(--bg);border-color:var(--border)"></div><span class="k">bg</span><span class="v">paper</span></div>
    <div class="row"><div class="chip" style="background:var(--bg-elevated);border-color:var(--border)"></div><span class="k">bg-elevated</span><span class="v">paper-soft</span></div>
    <div class="row"><div class="chip" style="background:var(--success)"></div><span class="k">success</span><span class="v">#2C4A3E</span></div>
    <div class="row"><div class="chip" style="background:var(--warning)"></div><span class="k">warning</span><span class="v">#B8721F</span></div>
    <div class="row"><div class="chip" style="background:var(--danger)"></div><span class="k">danger</span><span class="v">terracotta</span></div>
    <div class="row"><div class="chip" style="background:var(--border)"></div><span class="k">border</span><span class="v">mist</span></div>
  </div>
</body></html>
