<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Specs table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-body); font-size: 13px; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate); }
  td.k { color: var(--slate); width: 42%; }
  td.v { color: var(--graphite); font-family: var(--font-mono); }
</style></head>
<body>
  <table>
    <thead><tr><th colspan="2">Packaging & logistics</th></tr></thead>
    <tbody>
      <tr><td class="k">Pieces per carton</td><td class="v">12</td></tr>
      <tr><td class="k">Carton dimensions</td><td class="v">48 × 36 × 28 cm</td></tr>
      <tr><td class="k">Carton weight (gross)</td><td class="v">9.4 kg</td></tr>
      <tr><td class="k">Pieces per 40'HC</td><td class="v">4,800</td></tr>
      <tr><td class="k">HS code</td><td class="v">3924.10.00</td></tr>
    </tbody>
  </table>
</body></html>
