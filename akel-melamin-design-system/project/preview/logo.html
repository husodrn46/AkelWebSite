<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .chip { aspect-ratio: 2/1; display: grid; place-items: center; border-radius: 4px; padding: 20px; }
  .chip.paper { background: var(--paper); border: 1px solid var(--border); }
  .chip.ink   { background: var(--ink); }
  .chip img { max-height: 84px; width: auto; }
</style></head>
<body>
  <div class="chip paper"><img src="../assets/akel-logo-cropped.png" alt=""></div>
  <div class="chip ink"><img src="../assets/akel-logo-cropped.png" alt=""></div>
</body></html>
