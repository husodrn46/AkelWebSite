<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body { padding: 20px; margin: 0; font-family: var(--font-body); } .list { display: flex; flex-direction: column; gap: 6px; } .row { display: flex; align-items: center; gap: 12px; } .k { font-family: var(--font-mono); font-size: 11px; color: var(--graphite); width: 78px; } .v { font-family: var(--font-mono); font-size: 10px; color: var(--slate); width: 56px; } .bar { background: var(--akel-red); height: 10px; border-radius: 1px; }</style></head>
<body>
  <div class="list">
    <div class="row"><span class="k">--space-1</span><span class="v">4px</span><div class="bar" style="width:4px"></div></div>
    <div class="row"><span class="k">--space-2</span><span class="v">8px</span><div class="bar" style="width:8px"></div></div>
    <div class="row"><span class="k">--space-3</span><span class="v">12px</span><div class="bar" style="width:12px"></div></div>
    <div class="row"><span class="k">--space-4</span><span class="v">16px</span><div class="bar" style="width:16px"></div></div>
    <div class="row"><span class="k">--space-5</span><span class="v">24px</span><div class="bar" style="width:24px"></div></div>
    <div class="row"><span class="k">--space-6</span><span class="v">32px</span><div class="bar" style="width:32px"></div></div>
    <div class="row"><span class="k">--space-7</span><span class="v">48px</span><div class="bar" style="width:48px"></div></div>
    <div class="row"><span class="k">--space-8</span><span class="v">64px</span><div class="bar" style="width:64px"></div></div>
    <div class="row"><span class="k">--space-9</span><span class="v">96px</span><div class="bar" style="width:96px"></div></div>
    <div class="row"><span class="k">--space-10</span><span class="v">128px</span><div class="bar" style="width:128px"></div></div>
  </div>
</body></html>
